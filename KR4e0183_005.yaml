body:
  text: 蘇門集巻五明髙叔嗣撰序送仲純李君赴四川建昌道少㕘序十一年四川撫臣言四川郡縣宋某逺在西垂而建昌接連西域孤縣一方去省城千有餘里屬麗永鹽井之際仇殺守廵官不可一日闕且雖有之或一人攝三四道者地逺事繁難於徧履惟上眷念遐方下吏部早選賢才補用久之吏部言往者議省冗官也四川布政使來朝言建昌管糧㕘議一員可裁革令兵備副使攝之吏部諸部議南北京十三省可革官本一時之議中間去留不能遥知惟下南京及各省撫按官勘覆明白永為經久之規奏可下有司未報前員至今未補四川撫臣言是其冬十二月吏部上禮部主客郎中瑜精膳郎中伊名上可其中一人實仲純李君為四川布政使司叅議理建昌道事序曰四方之極京師最北閩廣最南齊魯最東西方惟闗中而四川最西自秦漢開蜀漸被教化與中國亡異然山川縣逺夷僰猶存旤亂間作得人則治失人則亂夫京輔之地吏多而政急其民難治其吏輕逺方之吏寡而政寛其民易治其吏重海内亡事遐邇寜謐吏若可省矣而變常不虞假使萬里之外卒有旦夕之憂者當是時方思補吏以捄不亦緩於事情乎逺方之員不可省也議者之言頗漏於是矣巴蜀之地明興數被兵災然旤成不久四竟不擾旋作旋滅者豈非任吏參置之得宜虖宋大夫建復官議為慮誠深逺而又得李君以行朝議咸服仲純始為吏部司務懋行多學號稱最良擢為主客主客又宜漸歴一紀受是寵命故衆咸服也建昌雖逺努力為天子用於是文選驗封稽勲考功之寮咸餞而洪承志氏張崇禮氏髙公照氏陳太初氏王惟周氏謂叔嗣得交仲純最久則序其事送麥元實之貴州提學序今上元二叔嗣始遊京師舉進士海内賢豪畢集禮部叔嗣得交山東則黄徳兆劉叔正李茂欽南京鄭師周浙江應子陽廣東麥元實七人者又集于吏部是時文治汪濊七人者出入燕喜以文友也亡時其後叔嗣除營繕徳兆職方叔正御史茂欽户部師周行人子陽廣平元實行人各解去其後叔嗣相次茂欽調吏部師周叔正元實以使事出稍疎矣其後師周為御史叔正僉憲茂欽元實以憂歸而叔嗣則謝病去七人者益落上十年辛卯叔嗣再忝朝籍是時徳兆以武選火罷矣叔正繇四川謫判許州矣茂欽起家繇考功復謝病矣獨師周自浙来子陽在廷評元實精膳四人者遇之詫而各自驚相惜也亡何元實又以憲學之貴州矣繇厯癸壬不出一紀間七人者浮轉愁懽殊塗異情不可勝説回思疇曩之際俄如眩㝱爾使人愕􅀈倡言曰達人所以細萬物而遺吾身者身且遺之而計其它虖故遇其得衆人驚抃誇詡而未嘗喜也遇其失衆人哀戀悵惘而未嘗憂也今吾數人數遺迹而追往事撫當年而懼方来其心悶悶焉其貌皇皇焉其言戚戚焉怨兹㑹之莫再而數人者且不自料其將東西分析而莫誰止也於是抆涕不大可笑虖元實曰貴州大荒也去京師且萬里吾誰與居而不悲叔嗣以為生人貴遭時爾今吾與元實方撫壯立徳揚休垂光不朽視力所能匪善不為不然與衆人何異非疇曩所以抗衆顔而特立者志也奚必京師為近而貴州逺虖於是坐者又俱􅀈莫不酸楚激昻是歲也徳在壬辰背春首夏叔嗣師周子陽飲元實室餞之四人者相樂也已而相與􅀈明日麥子遂南髙叔嗣紀其事夀序嘉靖九年開封學長某祥符學長某商水學長某二學生某百餘人相與議于學舍曰今天子顓意徳化慮郡國學敝則道術流遁士亡從以出故移近臣輟以領其事甚重且寵方城公始用太子中允来治河南歲時行視下國收才民間汰斥不可開書院拔異士次第稟食之四方之士聆響畢輳又設春秋禮二經師集諸通是藝者使漸習其間期于五學並盛繇是七郡之士斐然回思于道天子之化旁流四溢烝烝向治于今二年某等自度終亡以稱塞公盛意者如何是嵗三月二十九日方城太夫人夀考七十始降之辰羣士又相與議曰聞之其母賢者也其子肖盛徳焉太夫人之徳不出乎閾竊觀方城公始舉進士于庭上擢為第一遭遇至隆也出入内廷坐議承明之廬兄弟結佩而趨儒者以為談先天子將建大用而試諸外自它人鮮不以為勞然人未嘗見方城公一語者是其所得豈當世所敢望哉此可以觀太夫人賢已則相與私于髙氏皆再拜言所以願為太夫人夀者狀如此叔嗣讓曰諸君誠欲進夀太夫人氏者計必選于能言以頌述其事然后休徳流于當世垂之亡窮為後之賢母式與古圖畵所著何以異若僕不文上亡以為颺師徳下不足以效羣士之私心是過聽而使僕也讓不能已于是纂次羣語以告于祝史獻太母無疆之夀辭送何進士元述惠州教授序刑部進士何元述上書言臣有親也老臣舉進士得事陛下幸甚顧日夜思親養不能湏臾竢願得學職食其稟冀有秋毫以報天子可之十一年八月以元述為惠州府學教授始何君登春官髙子知其文於是何子過髙子而問所以教人奈何髙子曰子欲易士習乎夫國以文取士試有定程已余與君皆繇是出也變之是反士好也人且不信夫官有條約慎取而行諸無怠然士則固敏化矣何也吾子舉進士進士時所髙少竢之可取尊顯然而君曰有親老矣日夜思親養如不能須臾竢願得學職此務求已志不求外知者假令矜一官亟趨榮顯忘父母養榮顯也計何益於身惠之士聞吾子之行固已灑然而異它日觀所亊親旦暮趨堂下上食稱夀愉有和色君有二弟益敦友行人莫不改歎孝弟興而化美躬行於家非外求益也所以教人者如是耳夫人孰不能文前言哉而行不逮嘗為世姍笑欲教人得乎自叔嗣任朝冠于今十年觀士習益媮操行不合古人其修於家者非也此非為師者咎乎君惟端其行而責實化自此始何子謂客吾得惠州而甚喜恵與泉竟接也土風不異道行裁十日相吾奉親旦暮趨堂下上食稱夀吾以二弟從吾居也客問何子令子假三旌之貴以受萬室之邑然而與父母月違也又逺兄弟則如何何子以為戚髙子聞而叙之是時也餘姚錢君亦乞得蘇學送徐君崇教江陵明府序海内之勢譬者曰如身使臂如臂使指今由撫廵而藩臬是坐論者也繇藩臬而府州縣是役使者也然縣尤難此譬以衆身而加一臂衆臂而加一指也為指者常病矣一省之大凡在上治者一人於縣無不統也為縣者常病矣是故政令不宜則病因而行之則民被其疵因而不行則我受其罪如此病已數易則病廵撫意有所出御史方思而矯之前者革之後者方思而復之如此病已計三嵗終撫易一人或二人御史易三人矣藩臬諸公大抵半易當是時縣方承其後雖冉季猶難民性五方異宜緩治之不能不驕也急治之不能不怨也計百里之境一人領其上百姓終日且不知吾心而能知百姓之心乎吾朝夕奉上簿書不暇事上不暇而暇行政乎二者均之難然民之難未若事上之難也故為縣者順於下邪則民䝉其利而上不之予順於上邪則上予之而民不䝉其利上予之則賢上不之予則否而朝廷之用人也常繇之然則順於上乎吾秉道而行不失諸已上果其人則猶我予也設非其人猶足免於罪戾矣然則順於下乎此賢人之所以有志而衆人以為不暇泛泛焉視之而棄之者也人臣幸得事天子雖繇今至公卿鼎食無足異者無内外皆臣也豈以一縣而棄之哉天子以印綬假我它人欲從旁撓之乎故上令可行行之不可行吾不行也寵利毁譽無秋毫疑於心政成而後去治定而賞及之則奏功乎一縣而天下且頌之又何計難乎此吾意也凡前難之者衆人意也鄉人徐崇敎舉進士三年始試於江陵友人既祖之則繼之以言贈山西王都司朴守中都留守司序髙皇帝既匡中國鑒宋之失武備弗振使邊患孔棘旤被天下也法初貴武乃易樞宻院為都督府五外設留守司一都指揮使司而下凡武職皆加文吏一等歲天下諸司表賀京師大鴻臚傳則留守司為首豈不欲强國勢眎人以勇且使知王基所在耶然裁百六十餘年兵微疲人趨于文日習末儀為儒衣冠擇地而仕以養交游不任弓馬皆下留守司不樂其土髙皇帝奬頑勵懦用役羣材稍百數十年遂若是中都之地周酆鄗漢豐沛也祖宗陵墓所在沐湯所邑甚貴且嚴而人不樂之何也眎權所在而以無事為病也人病無事而遂忘所事此最大患不足用法山西都指揮王君朴始用武舉科簽書是司山西地廹邉陲而走京師也近民愒于法難以設治未可旦夕處已而君遂居八年人皆强取以為功而君獨退然無庸人皆眩智以媚時而君獨黙然無為人皆售材以争進而君獨鬱然久困衆以是歸君之㢘静㢘靜非壯士節然貨利不入其心榮枯不易其操固良將材已十四年九月天子拜君為留守司正自山西眎留守司留守司稍優君亡所擇置欣惡于是益見君長者雖然海内方承平君乆邉陲知士馬數道里險易倉卒如為大將何以易子慎毋以無事自佚同官于君之南也使叔嗣叙其言贈楊方城公上山東布政左使序上以侍從之臣政未洽于民乃歴試諸外若求輔弼則用是而充諸臣或厭于是而有佚心故弗能于治惟方城楊公不然公舉進士第一人為國史修撰太子中允者七年出為山西按察司副使山西京師視為邉邑薄之公無所變已而徙河南用以修學政久之轉山東布政司㕘政守海右諸道督漕入都越十四年轉為山西布政右使九年於外服益恪不懈政聲四塞吏民顒然靡不嘉頌夫上厲精中興本漢宣用蕭望之意下徙近臣而公覃於六藉學無所不觀文章為當世冠又不厭為吏越望之甚逺十五年七月二十日轉為山東左使廹次公卿之選叔嗣觀古者興國之臣皆木呐無文若敝矣然而恒治則其人皆起民間習知疾苦所發政善也故内外均及其季也皆文學儒生若華矣然而不治則其人皆少貴不嫺於事所發政舛也故重内而輕外髙皇帝定天下畫十五省設官之制曰朕有天下更行省為承宣布政司所以承者朕命宣者代言布者張陳之政者軍民休戚國之利病自㕘政以下皆自辟屬蓋嘗御書其門顔其重如此山東西京師輔車之地士馬財賦緩急以需後世宜選賢建治而或薄之然則積輕豈一日哉公于山東西皆再履之熟知閭閻利病道里隘塞財賦所出無不講國既賴以為重遂據鼎鉉登元宰受鴻名而佐道治俾天下内外之勢不偏當繇此已吏民久矚望于今羣僚感公之東咸述明徳作此序辭以示後式嘉靖十五年歲次丙申秋八月之吉贈曹堯我公上順天府尹序嘉靖十五年九月山西廵撫都御史廵按御史言山西災布政左使蘭施政最良事注賴之雖三年滿願留以治疏上報可㑹順天府尹闕衆皆心儀之十月闕日公果拜為尹始公以辛未進士為大宗伯大司馬屬聲譽隆翕出補鳳陽府以不事權貴左遷浙江鹽運同知無所動轉福建運使未拜起家山西太僕卿歴今官所在不擾有去後思其在山西叔嗣幸得終始侍其治大抵以㢘静為本一切繁浮屏去之財賦出納惟謹吏奉行條約府中晏然無事是時山西壬癸甲連歲大饑而省中多巨室大猾號難治公既與之休養而持法無所縱舍吏無以為奸于是上下皆安故滿苑洛韓公言于朝也其言云云君子以為知言叔嗣觀漢之興也承周秦之敝髙恵之間民不勝其病公家平陽侯順時之急師事盖公與百姓休息故當時大治于漢為元臣後世稱賢相無繼之者公之學其繇来逺矣推是治天下可也京尹豈足言哉雖然山西三年賴公以息肩吏民無以留惟日夜望遂為宰輔施大恵以和四國願公無忘叔嗣竊不自外旦夕承以為師羣寮既祖俾序其行安敢以不文辭贈陳中川公拜山東按察使序十四年乙未中川公由山西布政司㕘政拜山東按察使髙子受命序其行未就踰歲冬公拜河南布政右使既履任始畢序焉客謂公已遷拜補序之不近于復乎髙子惟侍公之日久又代之守冀寜所知三事俱盛徳可式恐後益久遂冺不傳乃作序以示永永其一山西甲午鄉試任西溪公為布政左使充提調當復用寮佐一人御史决之髙子懲曩者同試南宫之事且不欲妨衆辭去歸本鎮㑹任拜都御史遂撫山西當改辟中川公卒引髙子同事處其上不嫌也酉月朔又八日髙子始入院中諸事皆受成公考難亡不曉鬯每丙夜始寐其精厲若此公少以善文四川舉之第一人登進士讀中秘書學益閎邃為憲臣兩察學政士亡不歸師之名髙天下然院中每屬文一篇成必折諸人髙子盖嘗刪之數字不辠也故人服公之量試稱得人録文至京師不至詆譏夫人茍心不相許鮮不以名相下遑恤其它然則公之量莫可及已其二山西多豪族定襄人李仁子希沆尚宗人女故家横山築城自衛奪民田匿亡命縣每索逋至城下第闔門相謝且數十年嘗惡縣令使客盗其印䧟之大辠郡中震焉莫誰何公以計縛殺仁獄甫就而遷髙子代之因墮其城歸所奪民田三百頃劾希沆褫其官逺近大悦故人服公之明公下車常先徳化此細者何足著欲著其得民也其三五臺生王師祖以私愛格殺其妻陽縊之室事聞公按之抵辠師祖富於財萬端營之莫解既公遷也則或釋之髙子治文書得其巻歎曰是陳公所正獄也而可釋哉使吏發王氏婦塚診其尸如生一縣中盡駭異乃殺師祖故人服公之㢘凡三事皆可紀且熟知之作是序鄭太夫人夀序光州鄭修之既登進士掌行人之職其冬受命禮部使於蜀持節過邑而母夫人氏夀七十賓客咸賀於家祥符人髙子賢言曰夫人姓尚氏與憲使公褫同祖始歸於鄭生三子而寡貧矣夫人乃奮力勤儉躬視臧獲耕織家繇是振布衣蔬食積餘為子師友費故修之有成為天子使臣榮衍鄉閭也敬願祝夫人麋夀康樂無疆觀賢子之終成也以陟於尊位次歲癸已陽和方始太夫人加年有一于古難致之物東海若木之杖西山桃實之觴玉山之禾以為飯丹丘之泉以為漿江妃仙珮洛浦明璫青雲之衣丹霞之裳願資以為獻是日夫人出御北堂堂上畵西王母圖壺觴在左賔客在右修之乃以諸賓拜為夫人賀夫人慈顔黄髮愉有夀色雖繇今百嵗未艾也諸賓皆拜遂為修之賀叔嗣觀古者國家之興不獨其君子賢也盖皆有母徳云然内徳幽貞不容贊已自予與鄭修之遊也謙抑博約以予陪役春試始終執其禮不肯以齒先此非其修習於家者厚也不能然者故吾欲祝太夫人于子考之雖微善言竊不自外願從諸友後以獻期耋之夀送張東田伯翔致仕文昔漢河間相張平子居職不樂淟涊是愠故叙四愁之詩作歸田之賦後世君子伏讀其書未嘗不嘉奇志之髙翔而恨盛徳之終詘也江都東田先生守河南布政左使引疾遽歸解印將逝抱素願以自潔嗣𤣥風而髙蹈抗疏王庭兩致其辭悼行年之將邁顧與物之多違奉職無狀中切憂危語具在前後疏中於是有詔特釋其位未老懸車暫以逃禄初先生以南陽㕘政病免于家杜門受業鄉里服化奄及七年絶意榮寵㑹今上協九八以開期登十六而該輔始起家四川參政河南布政右使尋領今官數月三遷强出巖石固已使朝廷虛心而仄席縉紳拱手而避位然猶甘守屠羊之心不顧飛龍之運此固逸民之絶軌盛世之貞士也昔先王圖治旁求俊傑必崇謙退以防横流人無老成儀刑安取羣僚在列莫止其行咨嗟徙倚咸馳空谷之情銜遵渚之思遂因出祖使獻其文云爾南山詩序粤在癸巳九月叔嗣被役于山西繇潞安則朝于瀋國踰年甲午二月望遂分守冀南行諸縣因復朝焉凡再見宴禮有加然叔嗣天子外臣使事嚴恪不敢自越竊觀于王國諸族睦悦咸蹈于禮闔郡肅如也而王國諸臣長史宗孔南儀賓瑢賢六七人者以文相友嵗時賦詩稱夀號為最盛若東火之仇又敦禮克讓非感化于徳教則不轃此聖天子以道理萬邦藩國克守侯度本支百億盤石四安皇天其錫䕃國家者亡窮縱有善頌無以益其説愚如叔嗣也又何以言者於是瑢再拜言曰惟王盛徳有文當垂永永與明亡極配於南山羣臣歌頌咸藉於斯義放詩魯頌號其編曰瀋頌詩凡如干篇視叔嗣其目研岡先生集序河南中國之樞四方之都㑹人文最盛明興沾濡王化瓌傑挺生自叔嗣得承宴侍若空同李先生大復何先生浚川王先生後渠崔先生柳泉馬先生有涯孟先生研岡杜先生七公猶宗廟之有瑚璉朝廷之有梁棟士用仰止觀其精美之藴卓犖之節敷為政事發為議論衍為辭章著為翰墨皆中榘度以垂法式巨細咸宜物理必該成一家言而余得交于研岡實有忘年之誼相與考先王之道遵哲人之軌彌歴年所叔嗣始為𨽻古之學本以説文證以鼎彛考以漢碑准以章草先生不謂之異為辭賦之學先國風楚騷次漢樂府昭明所選下渉盛唐先生不謂之溺為制度之學考周五官酌漢八書及唐六典遵諸司職掌先生不謂之迂泊然自守不養交遊不貴權勢以違于時先生不謂之愚道合則從不合而去仕于吏部屢進屢逐補吏邉隅先生不謂之罪可謂相得于形骸之外已先生有集若干巻衆刻之傳於世叔嗣䝉知最深宜序左方竊見我明有天下四海内外以稱臣妾百六十年兵戈寢息紀綱政治罔不畫一學士大夫講為文藝比跡先民遭進今上益隆文治禮樂修明小大顒然咸登諸用數君子生其際遂享大名為儒宗匠若是昔在巨唐詩道中興許燕擅其美沈宋極其至其後李白杜甫之流遂作雄詞逸氣沛若江河上掩前古莫之與京白之詩曰揚馬激頽波開流蕩無垠盖傷周楚之音亡而漢魏之聲離已然甫白之開流則亦已甚作者靡不遵其軌轍慕其風猷以迄于今羣公繼焉㸃翰敷詞不翅抗行翕然同響盈被朝野文章之作于斯為盛後有知言必是焉觀叔嗣既守邉隅不復奉對以究緒論録感遇之由爰及數公庶梁宋之間聞之以勸撫平録序嘉靖十二年大同之卒復嬰城告變朝廷議將盡治以懲以天下之兵翦此方隅無不得意而非天子之仁也故誅其元兇矜其醜類選良臣焉以善其政布我大惠惟邉徼之恤于是都察院右僉都御史雙嵒樊公實受寵命照臨兹土公縁上徳意除苛用輕蕩然與士卒更始仁恩汪濊凡境内外靡不懽賴强者寢憂弱者忘死安其室家有其孫子疆宇大和由是考戎實修馬政興廢舉墜摹畫精明奮兵擊敵鳴鏑逺徙奏功京師天子大悦璽書以勞賜服嘉新吏民歌頌載諸圖牒叔嗣惟邉塞之民與中國異本以謫戍屯諸境上扞蔽戎狄使内亡憂惟其桀勇以為邉畧豈它之慮盖徒恐不知天子之仁所以生息之故今大同之卒既以自亂上寛其死懐服明徳公復申之其澤益深無不履戴邉境以亡警功徳至盛宜有歌詩傳之無窮惟公曾大父司馬府君當永樂辛未之歲䇿名受事出入兩朝翊贊宣皇開府濟寜勲績爛然垂于後裔餘休永長公以正徳辛未登朝光嗣前烈為國鼎臣文事武功異世同符歌頌之作代有其人充盈于家榮觀誦法必取于斯知府誥遂刋為書叔嗣謹序諸左方再作老子集解序考功薛先生既屏居亳一紀致崇於學庚寅始注老子號曰集解余為序其書刋之甚著先生意未覃盡時復損益丁酉乃成視余讀之義加精微要以至道協于大中繇漢以来言老子者盖至是决矣顧世莫有與知老子者又孰以知先生之注序曰始余少讀老子謂猶皇帝王伯之降所言殆上皇事爾朴而不華後世弗能用也誠竊之亦足寡營而致治壯益讀之則見與聖人之道亡牴牾可施于世特其辭所出抑揚已甚驟不能通愚者欲信之助以靈異繇是遂為儒家所詘置為養生之書其徒守之至言湮晦要之古之聖人所學咸修已治人之事或得有淺深見有純駮爾奈何絶去使世諱言之老子之書殆於息矣余懐此意未有以明其後仕都質之今祭酒武城王純父先生孔老所以異奈何純父答之𥅆與尼父意同而言異彼生于周末睹文之盛也嫉欲還之古故激言之激則不能亡過中已試言之仲尼曰人而不仁如禮何禮云禮云玉帛云乎哉禮與其奢也寜儉而聃則曰禮者忠信之薄而亂之首也其激如此去仲尼之辭逺矣故尼父之書誦法萬世而聃卒廢而為它也余藏其牘他日仕山西復質之今京尹曹徳芳先生其言聖人之言道也猶人之名天也中國謂之天矣彼匈奴則謂之撑犂豈有二哉特其辭異耳天固不自知而人强名之又爭辨之故學者誠求至于道凡支言可忘也達哉言乎盖二先生皆深于老子者今以觀考功之注尤信易大傳曰天下同歸而殊塗一致而百慮學者習而常聞如不見其同與一獨以其異也遽詆訶之蓋讀其篇未訖往往已驚豈但老子邪嗚呼難言矣百世倘有其人固自知之余何暇置譽毁哉記二先生之語篇首復作序太平經國書序正徳十四年余以増廣生被試䇿問周禮疑信相半之繇余方少竊聞其槩因以意對曰昔孔子之時周徳方衰而對魯哀公以文武之政布在方䇿人存政舉之説及周益衰孟軻氏始言諸侯去先王之籍不得聞其詳彼所稱方冊與籍豈謂周禮耶孔子尚思興東周孟子則直勸齊梁以王當是時不但其籍亡雖有之固不可為耶至荀卿之徒李斯佐秦遂取經籍一切焚棄之後世以為辠然使始皇并天下為周武王李斯有周公之聖其時欲行周禮能乎周之興也深仁厚澤垂十餘世聖后繼作禮樂法度莫不講明國以為敎家以為學漸被陶融非一日也故周立為天子頒其政式放于四海靡然信從事若畫一不竢强勉其来逺矣秦則不然以戰鬬為功以干戈為業法令已成習俗已定方其烹滅諸侯而六合為一也雖有周禮將安施之而况後秦者乎何也先王之法至周始備至秦始滅去此其㑹也後世直用秦為古耳秦不復行周禮明後世之不可行必矣然則是書可盡廢耶何為其然也三禮莫古于儀周公所親定者説文云禮之字從豆從曲從示示古神祇字盖先王于籩豆神祇之間曲盡其意于是乎録其升降等其隆殺故謂之禮此其跡也先王之意有不在是者周易觀之彖曰盥而不薦有孚顒若先王以其誠敬之心事神故下觀而化故傳曰聖人以神道設教而天下服矣今夫官名之設内外之辨崇卑之度多寡之數成周致治之具也而所以致治豈盡于是耶故善為治者師其意而已若周禮者存之以考可也其畧云耳是時南原王先生督學優之其年叔嗣舉于鄉後三年得進士為考功主事始好是書聞人有異本不憚求之同縣人按察副使田勤甫氏刋周禮集説讀其中往往引太平經國書可觀取恨不見其全他日翰林學士姚維東氏云有之傳以示叔嗣録藏于家後十年而為嘉靖丙申上冬朔日刋于山西布政司栗上黨集序上黨栗道夫弱冠志學與古為匹遯迹太行之麓十年絃誦思幽入𤣥上瞰周秦之閫奥下渉隋唐之波流著詩若干巻歲己丑余解司封郎中屏居梁墟盡謝親友道甫擔簦相造雞黍終日笑言甚得乃出兹編三復嗟歎故贈予詩云髙風今重世大隠不居山遂忘年焉道甫既連舉不第詩名益振名卿大夫想見其人稱不容口癸巳余出守晉陽道經潞上見道甫于家總理文翰探得彌深又贈余詩云風聲隨斗望精采若雲流投篇相答邈不可逮余乃辭去毎持瑶章把玩忘疲嗟乎余少而無聞長而倦學名本東家之愚夫情類南郭之喪我曾何所知敢與斯文然于當世之士未嘗不聆言而心賞睹形而目成也道甫之作良契余懷誠無虚奬昔中郎倒屣於仲宣少府薦表于平正世亮有精鑒兹編者行役之餘輒綴數語用俟哲人栗陳州詩序夫藝士才髙位卑者自古不可勝數然名茍足稱雖詘焉豈可恨哉上黨栗道甫者余識之愛其文乙未歲朝京師翰林編修唐君應徳語余曰道甫詩可傳復誦其伯氏仁甫尤長歌詩思見之未閒也仁甫登乙丑進士㑹試第三人例以父尚縣君不得備宿衛補為陳州知州亡何遭讒口棄官築舍五龍山下屏迹不入城兄弟講業其間人謂其負謗易白而陳州辨不肯力咸悲其不遇余聞古之達人讓卿相之位屠羊灌園有逃之没齒者世豈能度陳州之心耶夫懐金珮玉揖遜人主之前誠與滅迹雲峯者不可同日語顧持操茍無悶當無疚于衷已丙申余始得陳州詩乃道甫為之次之者讀之終篇察其身名之際畧無所恨其所得逺矣余曩者嘗學于斯藝思所折衷性弱復善忘不能為𢎞麗之詞每數日裁譔一篇不喜輒棄去今益怠何足與知詩虖慢懶相乗願自放于山林之間聊作以抒憂耳故睹于陳州之述益感焉任吏部集序固陵先生始舉進士奉大對今上親題其文直詞絶識名冠海内士莫不延頸願托末交余辛卯春再登上國首奉欵曲宴語闌宵相得甚真乃投贈詩云文章知汝在交誼為誰深既遂别去其後余遷守邉垂世故相繫親交日疎疑莫與匹乙未春得以覲事祗役闕下先生猶敦夙好不薄厭之感谷風之誼誦同人之言君子于是知友道存焉時則翰林唐君應徳陳君約之司勲李君伯華咸相綜理文藝啟發微言一朝大振余拘以外寮不得久侍遂録先生詩謌文論總若干首用著矜式夫李白有詩人之材而無詩人之識杜甫有詩人之識而無詩人之度故言匪世法動迕于時余觀先生雍容謙和聲華益逺制行以周孔為師陳詞與詩書比軌不激而髙不刻而工治世之音于斯以備明王之佐舍是焉適先生復不以余陋而使綴名于簡輒不避遜敢揚大雅夫世有心賞之士𢎞麗精微茍有見於斯編其必讃歎愉悦犂然自解又何賴于余言乎是歲蘇門山人髙叔嗣謹序内鄉王殿下謁園廟序夫執珪結駟位由徳尊玉食瑶宫道匪人替維昔皇祖疏土建邦模漢京放周制本支茂於百世磐石冠乎諸劉周自定王肇啟兹土加大邑以褒稱慕小山而典學内鄉諸國殆且百餘諸侯祭于其祖厥禮存乎有司歲庚寅十月内鄉殿下乃啟龜以卜吉載鳶而祖行授館不驚上食在道遂用登于某山實惟定王卜藏衣冠之所也齋明有䖍改服而進神靈肅肅孝思蒸蒸鸞旗宿於青山牢醴修於碧殿刋石紀美禮成而還王國諸臣僉曰惟上稽堯典以睦九族體比象而親萬國大孝之化洽被宇内今王䝉犯風露馳驅山川展敬園塋起感水木一物不煩于民間百禮盡徴於士類自非純孝永思篤志履道者孰與于此且王自喪元妃遂虛内寢后宫之絲竹生塵賓庭之纓冕成市好古邁河間之風為善小東平之日休懿貞範不述何觀載金石而不朽被絃管以日新昭徳興文將俟君子叔嗣不敏家本夷門人同抱闗之生地雖梁苑才非授簡之叟故畧為著其大都以貽無窮云爾老子集解序亳老子所産也初老子著書言天道𤣥虚自漢以下莫能遡其本旨咸窺見一偏説由此起故其書日離州人薛考功先生始覃思大道之原究意天人之一折𠂻羣言合于榘度老子之道則粲然大明書成嘉靖九年歲在庚寅之次叙曰大道之歸一致而百慮聖人之旨同情而異言昔仲尼之門罕言天道是以後世無得聞焉然周易乾爻配象六龍始於勿用終於窮亢不以吉凶告人用九見羣龍無首則吉而仲尼賛之曰用九天徳不可為首也乾元用九乃見天則蓋剛而能柔天之道也此與老子何異故稱吾見老子其猶龍乎夫學者獨患天人之分不明天人之分不明則其議聖人者陋矣自古言仁義禮樂有過於孔子者乎然而非不知天也言隂陽剛柔有過於老子者乎然而非不知人也顧聖人示人有不同其所言者學者之所信也所不言者學者之所疑也故世之為老子者則絀儒學儒學亦絀老子夫知人而不知天者近乎愚知天而不知人者近乎誣奈何以此議聖人也或曰老子養生之書夫聖人之道内之以養其身則夀而康外之以理乎物則順而治聖王之事同條共貫豈有他哉作者既皆已没景響仆絶所謂其人與骨皆已朽者神而明之存乎其人薛氏老子集解二巻藏于家予録其副焉刻二張詩集序二張九齡韶州人字子夀諡文獻有曲江集説雒陽人字道濟諡文貞有燕公集馬氏經籍通攷載之自文章道熄修文之士薈萃篇題畧采名作習所目見不復知有諸家集余曩歲得曲江集京師蓋丘文莊公録自閣本刋傳之求燕公集亡有也後再至都始獲寫本友人大理評事應君子陽有宋刻然不完二集缺謬亡復可攷二公俱唐相事𤣥宗遭李林甫文獻出為荆州文貞出為岳州叙曰夫詩之作豈不縁情哉余讀二公詩方其登台衡執鼎鉉抽筆蘭室雍容應制詞何澤也及臨荆南履岳牧懐人寄言託物寫心又何悽也夫士抱器丁年曷嘗不欲感㑹雲龍道佐明主建不朽之業垂非常之譽乎而時謬不然逺迹江海之澨放意魚鳥之區事與願違心以迹孤况逢按劍之怒方同竊鈇之疑知讒不免欲語從誰是以憂来無端咸宣于詩爾嘗觀文獻在荆詩云一跌不自保萬全焉可尋又云衆口金可鑠孤心絲共棼文貞在岳詩云誰念三千里江潭一老翁又云平生歌舞席誰憶不歸人詞旨悲凉令人太息然文貞特牽歸思而文獻良多懼心豈其遭傾奪之餘尚險仄未平耶今集中載林甫秋夜一篇公酬答甚遜得于周易避咎之道焉彼讒人者竟冺澌何在而公名徳爛然存于終古嗚呼哲哉叔嗣遊郎署時覽公詩未覺沉痛既渉江漢三復焉乃知意所由興復以嘗踐兹地也因合刻之置廣視堂齋中堂據江夏山首下瞰江漢前使君葉縣衛正夫修築嘉靖丁酉夏四月朔蘇門集巻五
