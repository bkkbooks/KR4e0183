body:
  text: 蘇門集别集類五明提要臣等謹案蘇門集八卷明髙叔嗣撰叔嗣字子業號蘇門山人祥符人嘉靖癸未進士授工部營繕司主事歷官湖廣按察使叔嗣少受知於李夢陽弱冠登朝薛蕙一見歎服晚年自訂其詩文曰蘇門集陳束序而行之當正德嘉靖間夢陽以詩學倡導海內學者無不從風披靡叔嗣獨以清和婉約為宗密咏恬吟自標新頴雖未嘗顯與夢陽樹幟而舉所為拆洗吞剝之病不啻一舉空之李開先謂何李雖似大家去唐却逺蘇門雖云小就去唐却近王世美亦謂李何尚有廢興徐髙必無絶響是當北地盛行之日而深識之士俱已信其必傳迄今繹誦遺篇其冲淡清腴實有不可名言之妙王世貞藝苑巵言評叔嗣詩如髙山鼓琴沈思忽往木葉盡脫石氣自青說者以為善於形容馬之駿又舉羊孚所云資清以化乘氣以霏遇象能鮮即潔成輝四語為其詩贊人亦許為篤論蓋當時作者如林而論風雅之正聲要當以叔嗣為稱首固非沿流逐波者所得而比擬也乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀蘇門集原序嘉靖甲午冬束在史館時蘇門髙子業由晉陽入朝京師㑹都亭下明年束罷史職出僉湖湘憲事又明年丁酉子業由晉陽轉湖湘為觀察使從游省署中纍兩月而束棄去行湖北子業乃病病十餘日死矣嗟哉悲夫子業蓋嘗謂束曰余生平所嚮慕兩人後渠崔子謂余文不如詩崆峒李子謂豫書不如詩詩乃不如文矣㝢內知交非子誰定吾言悲夫已矣子業既死之三月束乃收其遺言而敘之文有知者勿論論其詩序曰夫詩以微言通諷諭其教溫柔敦厚為主本不通於微不底於溫厚不可以言詩由三百篇迄於唐其指一也國朝以經義科諸生詩道闕焉洪武初沿襲元體頗存纖詞時則髙楊為之冠成化以來海內和豫搢紳之聲喜為流易時則李謝為之宗及乎𢎞治文教大起學士輩出力振古風盡削凡調一變而為杜詩則有李何為之倡嘉靖改元後生英秀稍稍厭棄更為初唐之體家相凌競斌斌盛矣夫意製各殊好賞互異亦其勢也然而作非神解傳同耳食得失之致亦略可言何則子美有振古之才故雜陳漢晉之詞而出入正變初唐襲隋梁之後是以風神初振而縟靡未刋今無其才而習其變則其聲粗厲而畔規不得其神而舉其詞則其聲嘽緩而無當彼我異觀豈不更相笑也蘇門高先生子業夙稟降嵩之精早契藏山之㫖性鄰其庶學匪待興束髮就傅受知北郡李生弱冠登朝亳州薛考功一見歎服五言示志遂忘形焉良其𢎞麗之益異乎求聞通解之妙曽無先覺矣既雅見推重益自貴珍謝絶品流因心師古涉周秦之委源酌二京之精祕㑹晉餘潤契唐本宗每有屬綴佇興而就寧復罷閣不為淺易之談故其篇什往往直舉胸情刮抉浮華存之隱冥獨妙閒曠合於風騷有應物之冲淡兼曲江之沉雅體孟王之清適具岑髙之悲壯詞質而腴興近而逺洋洋乎斯可謂之詩也其言滿萬其年三十有七悲夫先生雅性亢潔不喜凡庸雖跡在周行而情歡在野故其在讀書園諸作特超𤣥乘雖屢仕通顯非其素衷是以即事賦懷每有憂生之歎夫志士惜日達生玩世古今人情諒同斯揆矣詩凡三百一十首文五十一首共為八卷成一家之言刻之山堂傳諸其人明州陳束序
