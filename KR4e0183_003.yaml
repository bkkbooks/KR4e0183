body:
  text: 蘇門集卷三明髙叔嗣撰晉陽稿自敘曰嘉靖癸巳余始出為山西參政春去都繇漕河泝汳歸上蘇門山以其秋杪乃履官屬歲飢奉役往來遼沁汾潞之間無寧日踰年冬朝京師其明年歸復自汳入晉軌轍所臨殆遍焉亡不再至者復踰年乃轉為湖廣按察使可謂久矣余本農夫每造山田林壑蓄志所感慨然太息歸心萌作發為篇詠又多戎馬邊陲之警其詩率著于驛壁吏從旁書之都為一卷略無去取觀之可以考歲月動定所繇自余之出友朋亡省記余在山西者縱記之豈復知其勞且久者呼雖余亦且忘其久何則居間亡事優遊暇豫則視日舒長今卒卒薄書朝也疲于應事夕則偃卧于室擾擾不知夢所之少暇不過玩日自解如此而豈復知時久速耶夫吾且忘我而又誰之求取觀所作篇恍不自憶雖然茍書是以視同遊庶嘗有省記余者詩凡九十首是歲丁酉仲夏望日河西主人壁不識河西逺留連夏日長主人設髙會上客滿中堂近海波流異夾河池館涼回瞻京邑路雲樹極蒼茫武城漕河逢張使君考功舊寮岸折留餘照舟行稱晚風歸心千里倦行役一時同置酒蒼波上停橈緑樹中思君如河水何日不朝東歸途大名晚行客心兾早安川途爭晚涉水宿阻風湍宵行問舟楫時見逺村明月出荒城堞良時余幸遭青瑣官常攝已多絳灌毁而無金張業來往路將疲出入心獨怯夜夢守舊閭勞懷先已愜初登太行山髙嶽千重發馬鞍故園回望客心酸他年筋力知衰健已厭羊腸九折難至蘇門山二首髙尚心徒在良遊今始能名山無俗侣日暮亟攀登空山暑氣少臨水夏雲多照影人將老愁心在夕波權店晚行孤城吹角罷黃昏歸馬蕭蕭向驛門衰柳更添霜後色殘流初耗雨餘痕求田未果青山願出守仍銜紫禁恩轉入亂峰行不進投身空館寂無言十一月朔孝義道山城風物歲將闌行縣初因問俗安授厯漫驚違一載趨朝尚記逐千官煙鐘動闕天微曙火樹薰庭夜不寒久沗恩私今始悟簿書催急驛程難太原縣西十里亭逢張景周憲使歸田京國當年進謁曽柏臺棘寺舊儀形未言投劾歸田早長羡出疆矯制能晉地雕殘非往日漢家兵火劇繁星逢君便作東西别他日相思記此亭文水縣驛壁讀王司僕德徵詩因和其韻一首長塗無驥足短髮有漁舟感歎如同日羇牽自去秋寒燈知客意鳴柝亂人愁屏上山川記何因認汴州清源縣作行縣時方暮山城歲弗登寒燈斜暗壁夜雪灑空庭案上間周禮囊中貯吕刑吏情那可道歸去幾時能交城縣壁汲黯匡君意顔延出守情慿髙無處語寒日下孤城汾州憶家兄時自虞衡郎中左遷同知嘉興憶昨蒙恩與子初雙垂印綬奉宸居賦詩春日趨朝後把燭良宵下直餘今日客身何潦草古來人事有盈虛江湖萬里天南北歲晏山鄉少報書十二月十四日有憶子陽仲材諸人一首去年今日共長安遣騎邀賓卜夜歡别後客身愁裏老向來人事夢中看殘更改席歸猶懶大雪盈庭醉不寒念此邊城獨坐語相思晴月滿林端至日晉府拜朝同曹仲禮王庭肅穆映朝暉圭景才長暖力微此日預沾新歲酒同時應認舊朝衣暫開宫殿倍仙仗端望雲霄拜帝闈不到邊城時作吏向來恩遇未知稀靈石山行長路天俱逺髙山日易昏強餘疲馬意垂首戀君恩襄陵縣庭邊地人愁老寒齋酒醉醒鄉心何處見院竹一叢青夜次冷泉關用吕太史韻山寺慿鞍歇冷泉髙峯月出滿林煙非關定性人忘睡自是驚魂夜不眠遼州上元立春城西寺同孟東漳作山城鐙火巧逢春野寺芳筵接故人石路晴餘雪色好花宫滿映月輪新一杯最喜同今夕再拜俄驚見此身舊事繁華君記否神京車馬逐遊塵遼州即事羇愁日日與春增分省無功笑吏能官舍到時常是客山城多暇靜如僧新晴滿院朝來雪佳節空堂夜半燈最是上元無意味平時宴賞隔良朋沁州次壁韻我心才撫壯客路遂如今鬱鬱終何事區區尚此心奮飛羞短羽歸去慕長林願受王喬術千秋開我襟分水嶺晚行客興日無奈兵荒歲屢加少年曽許國多難更移家逺水通春騎孤城起暮笳馮髙一回首何處是京華再次權店攝官強四月被役乃三來把炬尋山路傳餐就水隈憂荒早頭白忍事竟心灰客姓途人記官程驛吏催梁園即此路何戀不南回褫亭聞邊事用壁間李川甫韻川甫大梁人北來烽火震邊州春興無聊客鬢秋得喪此身真是馬姓名與世任為牛晴天亂雪吹空壑落日黃雲暗道周但有鄉心隨處是題詩人滿驛前樓送馮廷評還闕用韻銀鞍白馬使臣尊賓從如雲晉北門滿目邊城春草緑因君長憶帝京原潞安道公衙罷微雨潤春郭層雲冒空山訟庭方散吏髙閣閉重關緩帶不遑息投身簿書間念昔郎署居此時曹務間焚香娛道心服藥養羸顔良遊忽如昨行役無時還邊州多客愁日夕鬢將斑由關子嶺發兵入綿上儒衣曽事主羽檄且徵軍敢奮一朝畫而邀百戰勳深山連古木落日斷黃雲愁思荒村夕誅求不忍聞清源縣再作時上疏乞解官抱青朝還夕經途去復回山城仍滯雨夏館始聞雷客病關愁得鄉心逐夢回投書報明主早晚歸蒿萊奉次艾峯侍御送李參政平寇後擢任南陽之韻中臺決䇿靜妖氛幕府得賢獨冠羣正有捷書傳白日况兼寵命下青雲鳴笳喜動三關士授鉞功先四道軍見説南行蒙上賞汾陽人勒去思文汾陽道暮晴下四首俱奉和薑侍御之作連城催暮角暑雨變新晴垂穗緑槐合將雛烏鳥鳴山川發髙詠州邑寵巡行莫怪炎蒸歇霜華滿路清孝義道曉發新雨曉天霽餘霞抱日長平原多草樹夾路鬱青蒼下馬文侯墓看碑卜子堂埋輪一何壯共識無豺狼施同寺是日奉陪弗及樓閣丹青上煙虹石壁重雨餘淨香界天際響疏鐘汾水當階次綿山即近墉題詩人不見驄色亂雲峯冷泉寺露冕長林下酌泉大士家根深别有水色冷不關茶香象浮深壑毒龍護淺沙煩蒸若為減客思正如麻奉酬薑侍御見贈之韻探奇曽禹穴能賦豈天台長自羞知已徒言謝上材憂加年近老名在毁重來欲去猶增戀歸心寄草萊盤陀驛再用沁州壁韻一歲中四出此路乞歸又晚計奔命尚如今九折無良術三鑽豈夙心客程任春草官舍即晴林便作途窮哭闌干淚濕襟四月望後二日奉夀永和松山殿下八韻圓月光仍滿輕風夏始溫降神元此旦秉德自先藩玉殿朱絃合瑤宫紫氣屯雙童時獻藥三老遂通言汾水連天濶綿山插地尊儒衣得上客服冕盡諸孫齊奉千秋曲爭持一日樽淺材何以頌抽筆愧梁園秋日早起偶題鏡中一夜恨攬此二毛增寡識時方忤多憂日不勝雲霓發宵夢簿領迫晨興脫屣吾將往丹丘尚可仍提調山西試院贈諸廣文二首重門照月景華館肅秋隂吹角煙樓暝懸鐙夜堂深聖代急求賢不吝千黃金辟命來四方文儒集於今芳筵列珍殽盈尊敬子斟大國富俊豪譬木産鄧林所願獲異材以慰如渴心朱絃曲未奏清廟樂將沉希君鑒幽潛為我揚洪音惟昔忘疲謬趨役嘗南宫藝林閲衆彥文事參羣公琳琅充天府但愧非國工親交一旦逺悽惻數年中遇子携手歎感我夙心同廣庭曙色啓層閣銀河空出門賓御散嘹唳聞髙鴻離觴在朝夕别路長西東何言秋欲盡追憶無時窮九月河汾書院雨雪陪諸公宴集千山風雨集九日雪花深歲序嗟如此賓寮盛至今酒中催夕暝樂進解秋隂醉傍龍山飲誰憐幕府心贈亢思謙入會試因寄京師同遊函谷投繻日靈光著賦年王文考十九歲古人猶汩沒今汝遂騰鶱神寶初開璞龍媒早受鞭通衢千里駛美價十城連藝苑材如此離堂意杳然行收金馬績髙視碧雞篇京邑多朋舊同聲若為傳齋中檢舊集因呈孔文谷學憲寒城朔吹動庭樹曉霜繁省齋稍無事馳情念舊園發篋理塵帙展玩不知煩往事盈篇章幽居多苦言郡中盛儒彥暇日遂討論敢為矜文譽要識夙所敦廣堂宴晴暉旨酒湛芳尊言笑一相投逍遙窮朝昏心賞不易值素交世罕存疏簡本吾性牽拘守兹藩高車數來往無為厭公門宴别文谷先生赴祁州擾擾時相見悠悠遽逺辭離居不可道行役且焉之歲晏氷霜厲天寒鼓角悲軍城數杯酒官舍滿篇詩感激多新調飄零最苦思才髙世總棄名在衆方推暫識風塵色行霑雨露私郡齋暇北眺猶接帝京陲余吾驛壁秋日何凄冽曉雲隂復晴客行多所懷鬱鬱獨含情登髙倦長坂涉水亂河聲僕夫不遑息投館晨雞鳴惟昔負微尚于今遂無成田廬日榛蕪何由反躬耕寄言同志者羞作望塵迎送楊方城中允拜表赴都新秋雨微霽山川氣蚤寒朝日照長林隂霞冒層巒咫尺神京路追餞不可攀大君方垂裳海宇息波瀾八方修臣職表賀集長安天門闢日月神宫栖鵷鸞甘露降中庭色潤黃金盤跪進萬年夀夷夏靡不歡仙管奏樂府寶饌出大官君臣髙宴會維時良已難盛世思夔龍留佐虞廷端而我寄邊隅遲回亦何歎發平定以下入覲作空山懸日影長路起風寒京邑方趨役邊城遂發鞍孤心向誰是直道匪今難不是秦關客貂裘亦已殘井陘道中曉霜塗屋重寒日出林微改轍辭邊徼登車望帝畿深山藏驛道巨壑斷村扉欲問前征侣迷津何處歸得京邑書次新城作邊城迢遞強西還歲暮征車入帝關風定塵沙迷舊路天開雲霧認前山寄心轉切鵷鴻侣投足新從戎馬間謾道姓名人憶少瓊書長把慰愁顔良鄉壁間舊題間有虞衡家兄和句江海飄蓬歎此身重來拂看壁間塵五年題字今不滅兄弟相思淚滿巾過真定呈周中丞萬國朝正屬歲繁上遊要害此邦存使臣北下頒銅虎質子西來敞玉門自是霜威清道路無須雲騎護郊原宋都鎖鑰真堪寄漢代扶風未足言春日同上黨栗道甫登毗盧閣祗言逺出守何意暫歸朝僧舍春隂重神京暮色遙向來成夢幻所歷盡塵勞須共登髙閣客憂賴此消出都驅馬臨長坂征徒動逺情官橋楊柳映客舍春鳩鳴榮進頽前志激昻謝後生親交好相語此去偃柴荆寒食定興雪中二月鶯花少千家雨雪霏可憐值寒食猶未換春衣積水生空霧髙城背落暉忍看楊柳色從此去王畿定州道夾岸新楊映廣津客行無緒獨愁人故園亦有千頭樹二月中旬汳水濱再次真定城别陳秉中時自京西還經途雨雪涉冬春倉卒重過奈此身客舍留人酒甕熟官橋繫馬柳枝新河山半折北來路烽火全驚西望塵别去定知頭白盡邊隅誰念一征輪星軺驛雨中别林八南還驛外隂雲合窗中宿雨含深巖龍自鬬險路馬能諳短髮星星甚長愁日日堪休將南望淚歸傍二親談再赴晉陽太行山上作祗役方如昨銜恩更此年可憐客鬢改應厭馬蹄穿萬壑深蟠地孤城上捫天東南回眺處愁絶故園邊避雨五巑山鳴雨斷還續連山下復髙疏慵元自慣登頓為誰勞問館投身促防崖著足牢客程憐若此終念反林臯再過紫巖寺受事方從北持車還向西青林含日影赤坂造天倪宦味同雞肋官程任馬蹄蒼崖摩遍認隔歲幾行題雨後柏井同方體易疏館餘晴片日暉隂移髙樹晚涼微自窺水檻人將老轉念山扉客未歸天畔緑虹臨户映風回白雨過村稀荒庭一醉拚君共呼取濁醪興莫違自柏井還平定山行用西陂座主韻渴汲香泉玉井瓶午行愁熱待昏星空山寂歷鳴蟬斷􅕙水縱橫匹馬經日下孤城邊氣紫地偏六月草根青休將淺薄供時議自合深栖與世冥飲平定孫太守宅奉贈時夀八十二榆關月出滿晴暉留客芳尊盡夜歸本戀青山辭虎竹甘垂白髮守漁磯藥欄傍户花香入藤樹當庭葉露微便向磻溪問衰健周王仍欲夢熊非夀陽東寺閣憶體易朝來携手罷夕間賞心同岸幘層樓上馮軒野寺中嵐光冒邑里秋氣變林叢坐使客愁集非關尊蟻空太安阻雨有懷都下諸友蒼蒼雲木變川原黯黯客愁獨掩門卧聽逺舂白日靜起看隂壁緑苔繁官名薄劣慚新侣郎署遲回念舊恩強欲題詩報同舍便應投劾去鄉園還自鳴謙山行用前韻時體易使君亦至塵鞅苦西東追攀日復同戍樓雨宿夜山館曉行中峭壁排雲樹崩湍下石叢流觀亦可悅寵辱此心空平定城東西交口用壁間韻敢言觸熱倦悅此午隂長蘭氣清林薄蒲風散野塘髙陵堪下馬怪石欲成羊可念征途侣題詩偏驛堂宿八角嚴更金柝起杪歲玉關寒行侣時相問邊程進更難歸心惟日夜客鬢已星殘仰悟中林羽投枝亦未安晚趨欣口雲峯聊極目立馬獨愁心豈直關山逺其如雨雪深笳聲先入夜邊氣迥生隂疇昔長征意蹉跎力不禁欣口趨五臺一首戍鼓行人斷客心日暮悲長風卷沙塞積雪滿山陲濡迹亦何久孤蹤逺更危含情不勝道縱道知從誰途經五臺山不及攀遊客路迂回甚驅車悵此分懸崖晴度日洞壑晚生雲怵迫非吾意悲歡與衆羣終當卧靈嶽夙志豈徒云偏頭關傅節度宅守歲深堂絃管雜邊聲幕府宵嚴刁斗鳴起舞更衣聊自慰歡歌縱酒不勝情關河絶塞催寒盡烽火連山照夜驚改歲不辭征戍逺其如客病卧邊城再出太原赴石州舊路三年倦新林二月餘行旌晉祠水田鼓漢城墟願以烹鮮治無因害馬除往來竟何事愧爾行春車仲春山行春事殆過半客行殊未間流雲開白日微雨點青山身世本遲鈍林臯當早還煙郊草色長感此奈愁顔經向陽硤屢飯青岑下力疲路轉長投身應虎穴頓足即羊腸天地固無外關河祗自防驅車舍此去余意戒垂堂還自石州作傍舍新泉注歸途柳葉開出無十日計行作千里回衣帶不遑解車輪亦已摧公私兩何補驅走笑非才三月二日交城大雪建辰開此月上已預今朝柳絮寒應未雪花晚故飄輕盈對山榭點綴愛芳條若伴邊愁客經春總不消鳴謙驛夏夜間館草生遍芳林夏氣清月華何泛灩天宇益空明懶慢本吾性羈栖非我城投冠還舊里庶此逹人情寄家兄祠部郎中時自嘉興同知量遷自别五更歲相看千里長聞辭郡府謫欣拜禮闈郎稍進雲霄上還追鵷鷺行趨朝日振珮直省夜焚香得罪皇仁闊失羣豫志傷氣猶負然諾力已困迎將春草邊城緑寒雲戰地黃憂心何以見視此鬢毛蒼辛廷評慮囚後喜雨周人憂旱虐漢使寵循行不睹甘霖注安知讞獄平乘飇驅暑鬱入夜潤枯榮河漢分天澤雲雷慰物情一言折疑事九死出寃生流惠長無極汾州比頌聲省中夏日述懷聊遣塵事營宴坐適心歡重門永日影開簾新雨殘山城方覺暑水木湛生寒夕氣冒川澤晴霞映林巒顧懷職司憂眷然發長歎華居豈不崇斯人詎獲安先民計日食所戒在空餐薄俗匪足矜要使寸𠂻殫賦得蟠桃核奉夀朱使君太夫人昔西母降於集靈東方竊於金馬蟠桃之事世以為妄然陳核傳之先代斯物藏於大內宋承旨景濓賦焉故詠云爾瀛丘初種處漢殿稍嘗時遺實神應守殊形衆詎知加殽登玉案注酒比金巵一獻髙堂夀千秋樂不支赴平陽之役次冷泉關羣盜無由歇官程詎敢寧征衣犯晨露吹角動寒星匡時悲深志逢世謝壯齡誰言關路永馬足歲嘗經霍州旅次久客顔將老逢人舌尚存欲詢干主䇿所願與誰言霍嶽三年路汾橋十室村不堪驅馬去秋日易黃昏送方體易秋日入都用韻大壑朝霖滿邊城秋氣髙亦知王事急終念客行勞騏驥悲長坂鶢鶋悶太牢慿君報京邑曰余返東臯南關晚行笳聲入晚不堪聞驛路山腰向此分洞壑空濛秋雨雪巖崖突兀石生雲愁心邊馬方頻入寓目冥鴻定幾羣歸興轉從今日盡將因沙塞著微勳歸次南關驛作祗役忽于今經塗宛如昨秣馬息荒林振車越重壑歲暮滯還期客心悵不樂曰豫本沉冥遭時乃濩落化海異微禽蟠泥豈尺蠖方因遷斥餘始遂歸來諾逝將入雲峯滅迹從所託奉别南山瀋國殿下用韻二首玉巵申欵宴金殿覿丰神髙視文猶古虛懷德益新飄零敢自意迂賤許相親每憶文園夕留歡倒葛巾再奉瑤篇至長塗慰别情文章魏陳思寵譽漢東平日暮余吾道天長潞子城拜瞻竟無路祗有客愁生沁州張源鋪去國三年意還家此日心天寒客路永日暮衆山深沙塞人偏老風霜馬不禁如何更萬里投迹楚江隂蘇門集卷三
