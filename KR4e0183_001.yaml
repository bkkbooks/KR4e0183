body:
  text: 蘇門集卷一明髙叔嗣撰考功稿自敘曰嘉靖三年余繇工部營繕主事調補吏部稽勳已而再調考功時三原今光祿卿馬伯循為郎中鈞州今江西按察使張子魚為員外郎武城今國子祭酒王純甫同為主事海內方更化學士大夫相與講文藝之事翕然甚著而三先生皆當時號大儒余日聞所未知翰墨間作其後各以官遷替去而余出為山西參政蓋一紀于今余于是取往日所為詩讀之凡所作裁如旦夕間爾精神􅞕恍因以太息何則余少竊不自度思建功業垂不朽之譽今已稍陵遲上睹日月之易邁下悼齒髮之將衰感古之豪士能自樹名堅莫踰金石矣豐碑彛鼎一旦化為砂礫載績史册後至有未嘗見其書者名豈足言邪且夫同室之人銜杯酒笑語猶不能相信而欲俟百世之後邪年壯氣盛回思頗自笑此身譬如落葉隨風東西因時榮枯草木何擇焉方其吐英擢秀流詫譜牒與賢士何異何所加損哉固知亦不足歎矣時方徙居冀寧道初秋朔稍亡事因次其語載之篇首觀者知余懷所繇起云蘇門山人髙叔嗣題省中春夕纎月升庭樹柔風動四榮坐窺宿鳥至微悅觸幽情南國流鶯滿西郊春草生歸歟假羽翼長路起遐征冬至日迎氣發陽管窮躔歷衆星我行歲一晏千里隔趨庭圭測愁中永雲物望外停簪裳實滯迹夢寐何由寧御溝魚隂陽陶融萬物一軌惟其所在有生有死故賦云爾鯨沼滄溟𣲖龍池禁籞流錦鱗何瀺灂素水日沉浮地接皇仁渥天容品庶優風雲終有氣綸餌始無憂江使聞遭宋波臣或泣周詎知沕穆理得坎故悠悠明月引滿地金波迥中天玉鏡飛有烏多夜語無鴈不春歸影徹銀河水光翻織女機何當御尊酒常此奉澄暉秋夜直省中鵲繞瞻階樹雞栖入省臺蒙煙仙署合懸月瑣闈開伏枕南天逺聽笳北地哀潘生應髮變秋興賦序司馬倍腸回為木同先伐積薪異後來無言秋夜永申旦自徘徊冬夜寄友人客地殊不樂褰裳夕望通葭灰欲變節桂魄幾乘空楚奏今維切商歌古亦窮兔園推上客狗監數文雄留滯無萱草扳援有桂叢何因辭世網去矣作冥鴻送陳秉中之吳燕薊子分袂吳門千里遊風期夙不殞雨散使人愁目送青山斷心馳滄海流音容如可假夢寐一相求至日懷大梁諸友浮食變寒暑鳴玉供朝趨量力恨短弱更歲塞王途陽候浮天紀隂風出地隅感時頻自惜盈抱無新娛澄醪屢泛巵髙齋坐自持佳晨拘省署何似並遊時素雪交北下青陽吝南移往歡徒駐目祗足攪歸思引領托長謠情興何蕭條同懷在萬里勞望阻今朝萱有憂難解桂無隱易招願為皎皎駒共食故場苗魏安福文瑞傷其師地官左君然俾為是詩共擬丘明作誰云大雅亡時惟憂鵩集物以忌蘭芳垂泣驚相弔興言耿不忘鳯毛空挺異雞舌但餘香恨積涇流咽愁深省樹蒼招魂會有述一為訴巫陽再調考功作二首弱冠發大梁慷慨多竒志師事鳴臯子擔簦竊自異幾窮柱下䇿頗識壁中字雖非國士才通人嘗豫器始辱狗監知終奉龍門贄弛負歸中朝持戟備末位孤根難為容名過易生纍一官歲再移彌取簡書忌眷然懷夙昔回首日增愧引疾三上書微願不克諧徙官復在兹心迹一何乖軒裳日待旦閶闔凌雲排入屬金馬籍出與羣龍偕積賤詎有基履榮誠無階但惜平生節逾久浸沉埋既妨來者途誰明去矣懷鳥迷思故林水落存舊涯惟當尋素業歸卧守荆柴歲暮作旦夕兹歲改蕭條旅思多雲物媚晴宇氣候屬妍和崢嶸新陽至故景實蹉跎感時豈不懷二紀倐焉過栖身慚擇木望道歎伐柯如匏吾自繫匪玉孰為磨有髮日就長心短獨若何但云畢夙志唯力豈知他贈西原二首昔豫潛夷門同聲慕俊豪耳習長者風心馳亳丘勞共家大河側一水連波濤壯齡竊邦譽拔足參時髦吾子遂見知微才受虛褒傾蓋歘自值倒履趨相遭忘年當異代終日託同遨同遨詎幾時時變忽我撓詩人咏啜泣賢者憚餔糟送子今出居流言尚莫逃撫膺空踟蹰念别心鬱陶芝焚良有歎膏在那無熬惜乏靈均辭為君綴離騷平生好篇章抗迹匹古人上望建安風退泝開元津夙心空十載長懷莫豫親家本握剞劂文思效經綸恭承時嘉會中朝遘俊民興文方栖鳯著書凖獲麟置足述作場發藻何彬彬心賞始一遇神交邁千春將登昔無岸言卜今有鄰分離忽迫兹辛苦何能陳晤對不可期咄嗟動我神本抱中孚爻俄傷明夷辰子其崇爾德攄光垂不泯江翁挽章太息懷髙士常聞卜隱年一丘伴麋鹿三葉珥貂蟬遂啓專門業還資肯構賢藏舟稱太遽流恨向遺編秋情涼風吹庭樹蕭然已暮秋歲運空云往客行胡久留良時每易失微志果難求餘光儻可積但恐成山丘臘日璧昏時告遷懸象馳北陸朔風起庭隅白雪塗我屋客遊豈不久鑽燧頻改木祗役兼秋冬餘力不遑戮辰策幾犯星宵暝疲案牘自顧鉛刀質安能久持祿先民有逸行抽簪入空谷我懷中園遊曷云反初服生日年往望空除時來循虛至明兩無留晷吹萬有逸氣我行淹一周兹辰適再值束髮歲更七算齒紀將二少懷滄洲心壯損青霞志淮禽終異化魏瓠始同棄五遊存豫歡三費亡吾忌逹生庶不疚乘流隨所寄數詩壽顧中舍太夫人一鳥自丹丘翩翩何陸離二儀含景氣金母來西池三角挾上元飄颻等宴娭四牡翼雙虬後車載雲旗五芝結福地下采永相貽六樂列仙倡玄鶴整其儀七盤舞湘君廣庭自委蛇八珍羞水玉療我忽忘飢九醖安足重流赮方泛巵十洲尚延佇黃髮謝修期代贈李使君兵備齊郡執象流玄化包虎息金革還憂十二郡選屬備疆埸獨資樽俎士折衝展竒畫陽文辨赤土隂符訪黃石坐控負海險時搜孟諸澤功成象泰岱洪烈歸竹帛光命祗今辰申贈繞朝䇿酬家兄秋日讀書平臺見憶之作豫在長安初授衣平臺誰共偃郊扉青天寺裏客應到李白祠前葉欲稀旅舍再驚鴻鴈至離心常伴鶺鴒飛亦知相望相思苦欲學仙人縮地歸出自薊北門行北望何蒼蒼黃雲亘塞長胸奴冦漢壘鳴鏑遮甘涼龍堆坐已沒狼煙行相望將軍被嚴命倉卒備封疆出師憂太白募士乏中黃努力一再陳沫血不相當還思關輔險頃歲何流亡內地困蜚挽中人無蓋藏填壑力易屈土崩患難量欲陳九折術惜非醫國良初侍御巡鹽山西漢家事邊財已屈始置鹽官佐邊實征𣙜盡籠山海利均輸未免公卿失肉食寧知藿食憂富國不暇富民謀朝廷經費貴取足文學當年寧見收古來猗氏稱國寶舟車輻輳河東道頗聞大賈巧乾沒轉見疲人色枯稿繡衣持斧出西鄰却望關山驚敵塵匡時不必資鹽策為訪魚鹽遁迹人古歌二首荆和當路泣良璞為誰明茫然大楚國白日失兼城燕石十襲重魚目一笑輕古來共感歎今豫益吞聲黃河決孟門捧土安可補君子被微言擢髮不能數衆毁積鑠金羣言倐成虎吁嗟復吁嗟有懷豫莫吐病起偶題空齋晨起坐歡遊罷不適微雨東方來隂靄倐終夕久卧不知春茫然怨行役故園芳草色惆悵今如積謁海上人相京邑驅匹馬日有塵沙顔清晨整巾幘時叩髙僧關白日照仙閣晴雲滿空山相看偶一笑念此客身間富貴不可求余將從此還元日時有御製詩端冕趨三殿垂衣值七春帝歌時睹舜天樂曉聞鈞迂謬疲郎署遭逢謝俊民欲將草玄老猶愧子雲身初去都夜泛舟當日落解佩及春歸病比相如是情方叔夜非暖雲蒸海氣殘月吐洲暉今夕孤懷客誰云伴少微延津縣立春征路日才幾客心時已煩春風花鳥處回首憶田園安陽道雪中呈崔後渠先生開歲物始和首路風猶急淅瀝冒晨雪隂藹窺春日驅車臨故疆遊子情非一伊昔本丘樊養此頑鈍質但願得豐年耕稼事已畢又戀聖明朝不敢安私室撫身愧前賢卷懷良無術非公存明德吾志當誰述漳河上元日寄呈後渠落日銅臺北獨行南望頻鄴城今夜月燈火可憐春行至車騎關河南界盡處與親知别山河未可盡行處與春長驛路沙俱白關門柳欲黃親知還自反離别各相望且緩征車發中心戀故鄉登真定大悲閣關山千餘里平分南與北臨路兩悠悠客子情何極青山地北橫白日天南落欲緩故園思聊憑最髙閣途中遇樊少南便别行至安肅縣作驅馬一相見悠悠難再逢客心春夜月官舍白溝鐘不免微名纍其如多病慵空臨南北路愧此平生蹤安肅縣樓作恬曠少有志牽拘兹無成已自宦王朝誰能離官程殉祿歸京邑抱病滯山城憂來上髙樓農人正春耕感念故園居蕭散中田行新泉滿深池芳草夾路生日夕為誰歎所愧當年情吾生未四八豈遂貪華纓安肅縣寺病居漢陽董玄亮見過時董奉使還闕門前易水路下馬漢陽人野寺天晴雪他鄉日暮春相逢一尊酒久别滿衣塵不憚王程急應憐伏枕身謝病後初朝舊識趨朝路重來謁帝庭出門聽曉漏立馬望春星拙病身仍在羈栖志少寧盛時誰不戀終日憶山坰簡友人始至京師始自辭京邑終將守敝廬猶來殉寸祿今我情何如千里門前路三年袖裏書懷君不相遇日但恨頑疏寓居慈仁寺遊覽終日仙宫掩青松繞殿遮到來長春草行坐落天花閣上王城盡門前官路斜微身隨處是何敢歎無家與王庸之飲旅舍背都門春風酒一尊坐看芳草路回憶故山村為客難稱意逢人未敢言留君須醉倒無奈日黃昏歸自蕭氏園作到來日已暮歸去戀柴門空自山當舍其如酒滿尊心知柳葉長愁見桃花繁立馬一回首令人思故園毗盧閣上同伍疇中諸公西望客來常一上對此西山平向夕簷楹立憑空閣道行楊花飛暮野雨色動春城却戀同携手都忘羇旅情寒食日毗盧閣上寄茂欽髙樓晴出帝城南楊柳千家夜雨含欲換春衣驚客久况逢寒食思誰堪門前歸路愁心繞檻外羣峯僻性耽憑報故人應相笑微身何事戀朝簪送車氏之齊河二首車長葛人昔豫與夫子讀書汳水南今才綰縣印我乃厭朝簪落魄時難識離魂日不堪都門春復晚須對酒頻酣聞道齊河縣應將長葛同近關愁驛使小國想民風作吏情如此為儒數好窮聖朝莫不用徒自失豪雄飲任文選宅敢謂齊年齒常嗟夙抱心文章知汝在交契為誰深華屋春燈豔層城夜柝沉賴蒙終夕語客路一開襟與鄒生遊香山宿僧房遽愁春草歇驅馬春山中夜宿禪關下時將心賞同風生近谷滿月照前湖空終愧淵明輩玄言對逺公華嚴洞上夜作同鄒生宴坐最髙頭馮巖散客愁俯聆玉泉響仰聎金波流伐鼓山堂夕焚香石殿幽與君學栖遁它日更相求送仲實黃門扶侍還固始一路通淮水從親千里餘到門繫舟楫登岸啓園廬洲富千頭橘溪深盈尺魚明光待起草且莫賦間居晚出都門登寺閣柳葉桃花雨夜乾今年寒食在長安淹留不為依雙樹蹭蹬合應笑一官行出都門常日暮到來客舍已春闌芳菲滿眼心無奈祗上毗盧閣上看送别家兄張掖門時謫開州垂泣一相送臨途無限情功名何物是流落此心驚夢裏窺鄉樹愁邊滯帝城終朝誰復語猶去戀塵纓簡子陽廷評終日祗緣此微官奈若何世情堪歎息身計任蹉跎客鬢涼風早鄉心夜雨多故交誰復在無厭數來過雨中簡子仁員外積雨曠朝暮層城苦沉沉端居誰與言抱此懷人心一為軒冕拘遂使名迹侵長愧玄豹姿隱霧南山岑君通微妙理佇想開塵襟送閻公甫赴保定太守郡城三百里北望即皇都驛路客常滿征繇民未蘇門臨白溝水山繞太行途君到為良吏平生仰壯圖送别伍庫部謫居開秋庭樹落旅館日已涼髙空氣蕭條萬里鴻鵠翔子有江南行離别結中腸貧病憂方集無能具一觴平生寡交遊逮此盡分張讒言亂白黑賢聖昔傍徨顧我賤且愚如君則何傷榮名不足為憂患莫可量聖朝非棄才大君如虞唐兹邦佳山水遨遊保樂康窮逹難預謀願君履其常被言後作髙材多負憂潔身易招纍余生本頑疏何取當年忌守官郎署間恆若臨髙墜分過每自驚名微久知愧中歲反故丘三載甘斥棄秉操茍不堅出處成二致復此還京邑長路果顛躓赫赫明聖朝賢俊駢足次懸爵待天庭但非通時器人言敢誰尤默默傷夙志簡袁永之獄中本同江海人俱為軒冕誤子抱無妄憂余有多言懼昔來始青陽今此已白露豈乏速進階茍得非余慕罪至欲何言直以愚慵故衆女競中閨獨退反成怒追誦古時人蒙寃誰能訴皇心肯照微與子齊歸路送别永之憐君方遷戍况我嬰愁疾一别若流雲相從竟何日平生託交遊弱冠弄篇帙書願藏名山功期銘石室安知事不就跌宕情如一已矣復誰陳今亦反蓬蓽送别德兆武選放歸燕郊秋已甚木葉亂紛紛失路還為客他鄉獨送君罷歸時共惜棄置古常聞莫作空山卧令人望白雲送皇甫博士重補曲周辭邑初耽寂攻詩每晏居貧家滿坐客閉户一床書襆被情何忝腰章意已疏問君趨府處髙興復何如贈送蔡蘇州考最還郡漢家存舊令侯國有斯人漢法侯國人不許備宿衛紈褲諸生貴金貂帝族親登朝賈誼少拜郡孟舒頻半刺官猶薄全吳化已馴誥頒鸞紙闊板露鸐書真上最登王典中和頌使臣才憐同舍屈情以異鄉伸臨路何如贈期君樹德新送張比部允清歸養鼎食思歸養拂衣歡遂初深辭西署寵獨守北山居伏臘趨庭屢鄉閭進夀餘架樓藏紫誥閉户讀丹書吳嶠秋成橘江門日薦魚親顔老更悅取樂欲何如中秋同栗夢吉飲罷酒俱不樂開簾望北軒寒星出户少秋露墜衣繁散步憐新詠平居想故園空庭今夜月客思豈堪言送管平田先生頒封秦府歸省五等周分國三王漢世家日聞敦帝族時見遣皇華翦土仍鶉首疏邦自犬牙秦關通使節灞水渡征車過邑恩難屢登堂禮更嘉何如北山客行役動長嗟送太宗伯介溪公南都十二韻露板承歡渥天書拜寵靈春官典邦禮風后佐王庭出入登三事遭逢起一經持衡人莫眩講殿帝親聽妙思黃華句雄篇繡補銘龍文生赤汗鸞翮奮青冥暫枉神都逺同追祖帳停二京分化理八座備儀形仙棹花催發官途柳為青微生荷翦拂孤迹困飄零空謝伸眉日多愁短髮星公還衆所祝強飯念朝廷歲暮答許武部廷議懷歸掩閣日愁晚他鄉歲已深未能逃世網豈是戀朝簪以我不如意憐君同此心故園春事及歸路儻相尋再移居僦居屢傍禁垣西曲巷重渠路轉迷萬事無能心盡懶一官何補首常低歸衝落日時驅馬起伺朝天每聽雞濡迹自傷非宦業綸竿終有故山溪送仰之侍御謫興國别離無奈客心煩直道南遷荷主恩臨路加飱好自愛平居握手更何言連山楚雨迷官舍隔縣鄉音認故園君到江州定回首同遊霄漢幾人存送許國華之靖州太守零落同聲和者誰憐余今恨得交遲榜中初已收名士卷裏常因見好詩漢邸拜官懷綬日楚邦行縣卷帷時政成它日看循吏黔郡生祠第一碑至日省中慣逐官僚後欣逢郊禮嘉蒙恩賜冬假拜手慶年華暫亦休朝馬間唯待暮鴉人言郎署好畢竟未如家齋居偶題自免知何病重來尚此身愁多長畏客官拙竟隨人日鎖空庭印風添滿几塵山田薄亦好不去豈關貧壬辰生子客賀當長至渠生履歲和更衣起自慶醉酒坐同歌身世浮沉甚田園蕪穢多吾今只若此知爾復如何春夕同李考功道舊下馬春庭夕明燈夜雨深人多新歲感日有故園心磨滅名題柱凄涼賦賣金十年同省舊誰念各如今送陳永和鈞改官之真定學曩府君教處厭事嘗疑拋縣印之官又見向儒宮城臨沱水新橋在路繞恆山舊驛通乍到士人應認姓試詢父客幾成翁經中更廢蓼莪講坐處青氊恨頗同再去都别親知少缺經世用遭遇明時康出入在省闥仰逐羣賢翔譬如駑馬足側畏道路長顛躓不終朝中歲還故鄉願言守舊廬沒齒乃其常皇恩究微物明照收羣方改服起漁樵端笏陪鵷行頑疏果難容進退益多妨猶參大藩居守此國西疆華階豈不崇榮進非所望退念孤蹇迹臨路私自傷無為世俗牽久要不可忘秋日贈别諸進士陪役忝南宮文場收數公名加周鼎重價敵楚金同遽向公車别先愁客位空一尊良已薄慰此路西東别館敞秋晴離筵蕩客情致身付公等分手使人驚陽鳥迎霜動隂蟲候夕鳴贈言何以歎虛薄愧吾生蘇門集卷一
