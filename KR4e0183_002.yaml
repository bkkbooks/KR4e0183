body:
  text: 蘇門集巻二明髙叔嗣撰讀書園稿自序曰老子有言知我者希則我貴夫人不期於世之知而何較貴賤耶余素弗攻於辭戊子以吏部郎中謝病歸於家開封當郡縣孔道應接稱煩余於是徙之城東田中依舊廬稍葺治以居家貧遂力農事月裁三四至城而已當是時李空同先生方盛邑子之屬出其門撰為文辭模於古人若宋蘇軾唐韓愈薄不為也余私心不能無慨慕時時竊撰一二篇庚寅歲所著獨多踰年余既上京師斯事乃罷夫本非所長而强力慕之度必取􅀈於衆然其篇留笥中甲午余分守冀南將按縣晩出文水方初冬新雨已車行村墟景色如故園余怳然太息其夕宿汾州燒燭披取笥中詩事歷歷在目低回久之夜不能寐非特憾於詩也曩者不能取容故退而耕於野丘園之樂使人忘老而余不自持復且茍焉干禄淟涊於今犯詩人胡顔之詬其知於人也蓋希矣然則余豈貴邪老子之言明其玩世也已汾州多文士暇因出是篇正之髙叔嗣題于清心省事齋始至讀書園疲薾違時好歸來踐夙懽田園深自託朋舊肯相寛挂壁尋耕耒刈林選釣竿亦知身寂寞長冀賞心觀元日同谷子延賦雄都盛賔客車馬爭馳騖芳辰啓初年宴飲多所務不知灌園身何為迷方誤郊館抗空壑山扉啓峻路良朋平生歡就我今朝步城因並舍登徑為穿林度微隂原上明片日雲中露青霞照深池白雪停幽樹共貪歲欲新不厭日旋莫農田方在兹君豈數能顧子修侍御見過時謝病郊扉臨巨壑野日照晴空柳色春衣上波光曉鏡中當軒留駟馬出户倚䨇童欲問朝簪懶人今卧病同再同子延上方寺賦已沗陽春遊再陪瓊瑤作首歲與君同名區踐初約芳風散入林隂靄逓相薄微雨㸃春城流雲蕩仙閤樓當望逺立酒共馮髙酌樹裏梁王臺水際夷門郭伊余本孤蹤事主乏明畧偶因負郭田解印歸丘壑閒居道心増日戀空門樂安得拙病軀放逹長此託敘懷二首生長夷門郭往來莘野路家貧無良謀躬耕有逺慕始窮伯王畧遂覽生民故曰余本空疎當年恣髙步慶彼鳴鶴期沗此飛龍顧亦知敝帚材早享千金誤日月不我留撫心慚往素伊昔迨弱冠奮足參賢豪衣褐出下國脱輓造中朝聖期開九五河清在一朝升龍假𤣥淵鳴鳯託芳條五從宰府辟連荷公叔招名過有瑕纇道在無矜驕猶全不肖軀解冕來逍遙空同宅海棠樹下賦花下一壺酒為韻良辰隨繫馬仰靣看名花二月芳林畔春風柔且嘉不惜花隂薄愁窺日景斜花覆金杯中客坐磐石下芳條媚曉堂新雨驚春夜共拾落英妍翻空繁華謝酒半向髙堂不知送白日隔林見花景皓月東方出欲試暗香發彷彿情非一暝色起花間向夕景更殊游絲挂花片燒燭坐庭隅懽至不知醉唯憂竭玉壺手栽海棠花庭前歲已久客來能賦詩花開常飲酒主人龍門才今日成白首酬蔚士量見過勿以歸來早其如疾病何朝朝故園裏寂寂古城阿自入深林牧閒當大道歌知非蔣生徑求仲爾來過呈劉西陂先生將按部洛陽道出小園喧言洛陽去皁蓋首行春尚枉柴門步應憐伏枕身柳條簇官騎雪色沒征輪公問袁安事平生解避人酬李考功茂欽寄憶之韻别離方此歲談笑欲何時外物都相累中心只自持身迷五柳傳手把四愁詩零落親交盡如君能不思移樹道上春園就蕪穢雜樹生䝉宻不知雨露功長養何多術婆娑使人憐斬伐終余恤乘時聊徙植于以託吾室交生兩相當列映直如一轉令門巷新遂放雞豚出修修原上風團團村邊日紛吾本蹇劣兼爾抱憂疾敢學成都桑而謀荆州橘願及垂隂成初志儻此畢寄亳州薛考功少年不識字持㦸仕金門萬事蹉跎豈自料一官憔悴與誰言上書昨日辭天子還從闕下歸田里束縛始自重為人激昻尚欲酬知已不悟名輕世果然翻嫌計晩身如此便爾深林學遯栖家貧那免杖畊犁腰鎌暮向夷門北倚杖朝過莘野西伐木手營一茅宇披榛力灌幾藥畦篋中筆硯無時把肘後詩書坐懶題往往頑癡衆所疑悠悠端合困明時聞君解註五千字考功頃注老子宅畔仙窟定所知此日低頭應笑我平時開口却為誰晩步出門還自笑復此欲誰親惆悵村頭樹歸來路口人風聲兼亂葉日氣抱遊塵豈不躬畊苦東看是有莘觀游人大道通遊遨傾邑出車馬玉管移髙堂金鞭臨曠野盡踏芳草中時歌花樹下浩蕩春思盈留連莫愁寫回看巖石間顦顇躬畊者寄憶茂欽員外閒居已可懽况復乘嘉月山鸎日自鳴園樹皆爭發出從草際歸行傍村頭歇臨流或潄齒倚杖乃散髪此時正憶汝振珮趨丹闕霍開府載酒見過列坐青郊映容門畵㦸雄晴原獵騎外春草舞筵中玉珮邀皆至金尊狎與同無將灌園意錯訝楚三公少年行死士結劍客生年藏博徒里中夷門監墻外酒家胡有時事府主無何擊匈奴虎頸一侯印猿臂兩雕弧誓使名王侍羞聞邊吏誅長驅隨汗馬轉鬬出飛狐蒲壘遂破滅莎車不支吾甲第起北闕蠻邸開東都豈學嫖姚將椒房仗子夫春日行大隄花欲然芳郊草不歇冶服誰家子良辰爭馳突寳劍本侯家金鞭自俠窟共矜百金裝相誇千里骨雲散懽未終月明還城闕朱門徒御稀青樓歌管發倡女盡朱唇貴主俱鬒髮衣向車中更爥從坐上沒誰論墻東生白首羞干謁春日省臺諸公設飲不赴作不能營世務拙病屬相尋偶隨飯牛侣遂此逃人心東郭春復晩三歲忽于今臺臣猥垂念張燕情何深公門隔崇重華館肅沉沉賓客盡來集冠蓋中如林恨以微痾在芳尊不共斟抽筆對來使日夕起長吟與客遊宋戴樓城門九老泉上草屩相携處田家水郭間林風動衣帶泉色照容顔軟草留堪坐芳花折與還春城一散罷車馬更難攀答谷司僕見問幸自返中園非關逃微禄方因疾病餘黽勉供樵牧春至東郭田夏來北林木時從逺原上日縱平郊目野老逢與言道書閒能讀何為共世人無事相追逐勞君問出處日莫掩茅屋與霍將軍集和大齡莊蹔息城隅駕欣隨驃騎筵園林窺勝地談笑接髙賢花外仍張樂林中正擊鮮晩來車馬散歸就故村眠紫團山人歌贈上黨栗夢吉陳州之弟紫團髙山槩青雲生賢吐瑞合氤氲二馮卓犖奉世野王不可睹栗家兄弟殊不羣陳州一出驅五馬令弟二十窺三墳博物自識顯陵䇿對人能讀嶧山文今日漢家方貴少歸來結綬朝明君賦得嶧山碑送李東升明府秦皇千載後嶧領尚遺碑斷石青山路孤城滄海湄蕭條餘霸氣磨滅想雄辭君到鳴琴暇應多弔古思與客集和氏園惟君遊每接自余居多暇留連上客筵欵曲中園駕賦詩芳泉側舉爵茂隂下放心安知憂携手不能罷日氣淡將夕雲影垂方夏為農信可歡世自薄躬稼曉還城休左氏莊與君枕隄日共結東城廬日出蒼林背回看十里餘柴門通大道村巷隔平墟主人心無事見客頭未梳累言惟農務一飯但園蔬方當數來往肯為容籃輿夏日林枋田家六言手疏偶然辭主腰鎌率爾為農今日田園自許平時車馬相從雨後千家競似雲中萬木齊髙路口來過杖䇿墻頭方挂㮮臯芳樹不知冬夏荒城何計春秋有客今辰携手無人終日科頭輕屐㑹臨池上方牀好坐林間酌酒壺乾未巳賦詩坐久忘還斜日深林度鳥微風亂柳鳴蟬茅屋人歸水際柴門路繞天邊欲笑於陵逃井還輕顔闔移家顧我何營世務對君但惜年華晩過陳藎卿時寓居廢寺不識禪宫廢來從客舍看如何種竹趣相對雨花壇新霽開晴景微風起夏寒淹留未忍去華月在雲端從陸道函間命壯年方自顧多病㑹相乘山澤思長往榮名懼莫勝浮雲寄宇宙野鹿返丘陵舒巻隨其適優游焉所懲從君問季主倚伏欲何馮得張子家書晩日照餘晴荒亭暗復明歸雲度深樹飛雨過髙城蹇劣慚當代栖遲笑此生空持一書札長歎故人情東原晩望答李鴻漸東原晩望草烟齊久卧無心出路迷閒立秋風看木落獨行斜日聽烏啼一官已謝於陵後百畆纔開莘野西此地故人應念我逢人昨有數行題初秋谷司僕杏山别業田廬元自接談笑竟相從是日當農暇秋風動客容開尊臨積水解帶挂長松欲去城東陌留連聽暮鐘贈别永和陳明府秉中余與秉中同舉於鄉今十年矣秉中始以親老乞教馳驅江海所懷未盡遷官西去遇於故園之間倉卒離顔情意吐申鬱鬱無已詩凡二百一十字十年宦未逹萬里猶一官適從何方來又陟晉山巒拊髀忽自笑把臂聊相懽伊昔被短褐同步入長安遭時賜顔色當年厲羽翰君獨念老親吴門彈儒冠髙堂甘㫖薦學舍苜蓿盤遲回竟蹭蹬感激生愁酸衆中見年鬢坐上論温寒明鐙對深夕還作故鄉看嗟我病狗馬昨亦謝鵷鸞無才媿明主仰荷恩波寛種豆白石岡垂竹清水灣白石清水皆今時名丈夫貴適志出處預難觀寸心向誰是逸氣徒莫干君其安小邑鳴琴到可彈石樓與永和自古稱彫殘不見太公望神靈泣灌壇世云石樓永和多挾左道故引秋風動當夜白露簷前漙一别更何所不覺起長歎逢李淮安悵别各千里忽逢指寸心明鐙不自意故國乃相尋寒館鳴秋雨髙城結暮隂胡為疇昔願江海尚如今楊州門主人空林一葉落茅屋幾家秋對酒涼風至開簾古木幽相看還自笑欲去為誰留正北夷門下休猜姓是侯雨後有懷子延驟雨新秋晩微晴墟落間悠然抱藜杖率爾倚柴關空壑纔容水流雲故滿山遙知城市裏應羡此身閒秋日感懷即事盛時畏易衰修名患難立伊余心不逮年命降將集素髮今已乖畫省昔嘗入感往慕寵靈憂來戀鄉邑咎本懷璧招時豈贏糧及坐見白露漙行方朱火戢小人安故丘始願終能執和汝南見過晩日留仙轡凉風勸客尊偶然擊筑伴依舊抱關門樹落千重葉蓬吹萬里根病身一如此誰念在孤村東壁偶題皁㡌遼東客青門漢代𤓰寧知汴水上更有野人家巾服臨秋換壺觴自逺賖閒身與逸興並向物情誇九日登城樓宋故都門佳節倚秋城朋曹晩相逐竊憐坎廪心蹔寓登臨目日落故鄉杯霜寒遊子服百里覽山河千年看陵谷生欣盛時康追歎亡王促帝功頽九五霸氣消百六猶能識宫觀但見登樵牧縱酒在髙樓悲歌對喬木身同司馬病懷異步兵哭舉頭望長天萬里來鴻鵠黙尋階除降獨去歸茅屋友人設飲病不赴荒村猶病卧空媿故交深復有髙堂宴無如伏枕心寒郊懸日影平楚帶秋隂向夕東城望寧知佇立吟送别蕭司勲柴門夜語罷惆悵出前林曉日孤村映秋風落木深别來生白髮歸去換思心還復茅簷下朝朝鳥雀吟逢友人幾年别京縣昨日詠歸來本無奔踶用且養擁腫材窮巷在東郭柴門臨路開經時到城市累月迷蒿萊傳君渡漢口八月朝天回鞍馬落秋風賔客滿高臺相尋重欵聚相慕屢遊陪客舍不洒掃衣冠多塵埃懽然握手笑對靣無嫌猜方思在霄漢賔友如雲雷春天浮屠館夜雨皇州杯鷦鷯各善賦鸚鵡皆天才看君振藻翰江鮑力能裁聲華俱美矣懷抱何悠哉而我獨病困于今翻自咍長鳴戀儔匹蹇步安駑駘賞心夙豈在離限兹仍催故園乘秋景黄葉紛如摧長天隨道路落日徧城隈贈言無終極蓄意獨徘徊偶題久為南畆客况此北忩時翻笑陶元亮應多歸去辭凉風昨夜起殘雨夕陽移坐卧身無事茫然生逺思秋夕問年有短髮逐世無長䇿日已逺人徒秋方卧阡陌天髙星流火夜久月生魄萬形觀此化四運愁相廹身非塞北翁情是周南客聊齊得喪心安此留滯迹感事涼風摧髙木夜雨生秋草蟋蟀吟東壁霜露凝西顥志士感夙心嗟此頽光早靜言執𤣥德長揖解洪寶亮乏嘉遯節尚慕丘園道古人逝不存何用抒懷抱曉起惆悵空堂曉蕭條秋氣隂懸忩對疎雨落葉滿重林長往懷仙事端居養道心誰知歲復晩髙志莫能尋王元玉偕鄧應和見過時元玉將北上霜落歲方晏田園空復情念君重離别邀客到茅荆晩日農夫語秋天鴻鵠鳴坐中問疇昔無事解朝纓曉出前林理櫛聽鳴禽搴帷望朝旭快然登前林烟芳紛滿曯秋晴帶餘隂夜雨生新綠道勝絶紛華情愜關幽獨在天羡白雲凌風慕黄鵠賞心久已違感此勞中曲簡李伯材抱病敢稱隱端居祗自驚林臯白露下庭際綠隂生偃蹇時方笑蹉跎歲屢征惟君重幽賞共此郊園情夏夜同袁德延騎出宿村家景落息炎氛輕策稍相試微風送林木皓月臨平地路逺忘前期情愜隨所至田父止我宿茅屋勸客醉起步中天空仰對明星次一貪雞黍筵三歎前賢意軒冕愁束縛江海傷憔悴且願為老農敢謂辭髙位明發返故墟努力看身事酬左舜齊林中冬夕見寄之作二首霜葉落漸空暝鳥飛俱罷出門歲已䦨倚樹人方暇映月眺煙郊了自見茅舍下有飯牛朋商歌滿初夜携手自京都歸心乃疇昔豈不戀明恩久持金門㦸今日故園身殘歲空堂夕含情亦何言塵耒挂東壁晩出曹門北道晩日郊關迥寒冬筋骨勞不知臨曠野何事走平臯斜路孤村引空園亂木髙歲䦨今去卧誰認在蓬蒿冬日西園泱漭空寒野蕭條只舊林登髙時送目望逺日愁心世與身為累貧將病轉深無能學袁盎閭里共浮沉西園再酬谷子延茅屋還相見冬郊那可聞荒城連凍浦落照與寒雲逺樹行時倚歸途到處分留君終日語猶自日思君谷司僕田黄門諸公見過山林髙士駕鷄黍野人心不避家貧饌難忘歲暮尋寒城雲際擁晴樹雪中深誰念平生意幽栖獨至今與諸公登舍右古城積雪嚴寒當此地尋幽尚有故交能穿林斜路逢人過旁舍髙城共客登玉樹望中梁苑盡金湯行處宋都曽留君貰酒柴門晩何獨山隂興可乘次韻田水南見過之作夜雪連窮巷朝來片日暉故人停駟馬問我掩䨇扉自出知誰是相看能爾稀家僮釀酒熟獵伴射禽歸草具成賔饌木綿對客衣歲寒心不淺日暮意難違客興催花發農功候鳥飛期君前浦泮預指釣魚磯劉西陂函山二先生見過簡畧缺世用守此郊扉居天寒草樹盡卧病情何如臺臣存舊好宴飲及吾廬伊昔趨天階俱衘君子惠提携文苑游出入鵷行綴良時未可忘世故身相繫安知尊酒同歲暮荒城際無輕一日歡乖離幾更歲招友人散髮終朝偃舊林墟中無事肯相尋數家砧杵驚秋早滿院蒿萊對夕隂多病秪堪謀藥物微官何敢汚朝簪濁醪漸熟來同醉無限蕭條歲暮心宴王禮部紹甫諸君寒日轉髙館微晴冬朔餘窮巷多氷霜車馬盈我廬良朋四方來各擅當年譽言論吐中堂温如春華舒枚鄒久不存梁苑為丘墟千載得斯人燕好同其初嘉㑹不可常古人言豈虚有酒今不懽歲晏情何如將去故園時有令請告三年削籍出身本疎慢秉志惟山潛請告及三歲拘廹時禁嚴欲出乏明畧退處還自嫌朱紱繫我腰仰戀明恩霑不能遂舍此安敢尚久淹且當整駕去三歎顧閭閻將赴京述懷請告有嚴程命降不遑安行子起自視當此歲已䦨出門冐雨雪所畏非天寒上戀髙堂養下顧同生懽將乖意方切欲去情彌難豈乏躬畊餘可以供晨餐終媿逹人心不能棄朝冠平生亦有志臨路但長歎三年保閭井國恩良已寛蘇門集巻二
