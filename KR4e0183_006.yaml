body:
  text: 蘇門集卷六明髙叔嗣撰記銘讀書園記七年春髙子署吏部員外郎被病久之注朝籍已復從病中擢署驗封郎中三月乃上書曰臣少不知自慎身被狗馬病遭遇陛下一拜官再徙再擢職自惟受命涼薄曩守工部主事移疾請告者二語具前疏中今春沈病暴興氣湧痰結害于眠食昏瞀顛踣臣以問醫醫曰是血衰氣逆積弱損心不治將害於躬夭絶天年臣竊自悲傷年未逮壯抱不測之病當朝廷建治之日弗能備用行伍獨困逆旅賓客左右過視無不憐臣為臣流涕者伏惟敕所司亷臣病狀無他以例免歸倘天誘臣衷不遂殞亡猶得下觀鴻化所成如遂不救亦得瞑目丘壑用其月放歸次月還上父母夀畢謝諸賓客不能共往來無何則屏居田間為約每五日夕入定省輒出以為常以書謝過視賓客不敢先以相勞自他迹不及城府所髙子乃稱曰始吾以元年冬去父母於今吾兄弟者三伯兄不幸以疾夭仲兄相次為工部主事非有人侍父母者法制仕者凡有兄弟不得歸養父母今吾以病免吾乃得侍父母孔子有言書云孝乎惟孝友于兄弟奚其為為政余用不肖之軀拔足隴畝間幸得備位郎署無毫髮有以稱報上者退敢自託于仲尼之意亦惟以無事棄日時復俯取先王之書所以遊神而廣思者於此審居身之序蓋將終學乎庶幾乎平生之蓄志本兹旨以建園名冠其元門采上語列之刻石東壁後之人其永覽焉東讀書園記出仁和門由宋曹門歷邊村隄達獨樂岡北至園出麗景門由揚州門右轉歷蘇村後走陳留道隄達岡南左轉歷白塔隄相國寺瘞僧所達岡中出麗景門北徑走白塔李氏墳後歷隄如上至園凡路四初髙子止西園西園垣廬新成然近念欲東東者大父所耕處自髙子他時未嘗一再至甚僻逺是時坐焉文堂心猶豫召僕問東路宋衡指地對出仁和門三十五里出麗景門右減三里出白塔減五出李氏墳後減七然李氏墳道狹不容車利走者又問一日往來如何冬後涉首春凌晨往食黃昏歸正夏秋初日出往食遊息日斜歸秋春杪晨往食遊息黃昏歸於是以囊盛書以缶盛糒以柴車載夏五月望髙子遂東父老聞皆過班白相向蓑笠交于户起與揖讓問所以歸狀遊仕孰與吾農樂多少髙子具以得事皇帝六年兄弟結佩趨金門之下幸遭知遇前後凡五踐省闥父母被封澤小人分過災生身受久病朝廷加恩不絶其官還耕於野謝父老遊宦無狀安敢望公等樂父老人人則大喜咸手操雞黍為勞髙子與之飲人人益説始西郭人見髙子自引避非衣冠潔楚固不肯見粱肉皆具書拜函為禮髙子大厭之及是雖袒跣人與語禮文益衰乃大喜謂可居也恨來之晚髙子曰世以莊周所録古巢許之徒譏堯禹薄孔公其辭不馴雅學士大夫棄不信謂其人無有然孔氏書載接輿沮溺諸公其姍笑仲尼已甚惡可言無其人顧其風淳至不可用詩書禮樂之際責者余始至於野受父老之詰乃無以應悵然久之固知周言世有斯人不虛哉髙子既自讀書園徙而東猶蒙前號加東作記定非亭記髙氏之先蓋自洧川徙云厥初漁陶於鄭門之野鄭門者宋之順天門也明興天下久既治邑中賢豪殆以百數而鄭門處其半咸敦誼相尚有古遺俗風髙氏又號為雄長家為門屋特大之聚族其間人乃謂大門髙其後衆稍分徙髙子之仕於朝白家封君曰鄭門吾祖宗所發蹤今吾宗族處之且墳近祖宗魂靈不無樂遊其中今故廬或聞乃為他人有叔嗣願因今求為室歲時伏臘上冢故留會親戚故人飲以長歡敬甚便於是家封君求修如之田於其陽所謂讀書園也會作園亭今上賜髙子告居之時從父老問先世事曩之賢豪之子孫之存亡其流風滅如也異時之俗無有盛衰在百年之際何移之易也豈其地有異乎髙子曰豫登鄭門之首循故城以西望其閭里遂直如人身首足不具父老為豫言往者盛時有老父過其下指謂人是有非字之象焉其後多是非之興其書云然夫古先王養民必匡其俗鄉遂各樹之長時書其人善不善獻狀於君君乃賞罰及之其所以防民甚備逮教化陵夷猶有長者能使鄉之人羞為不善不敢使聞之何者其行淳備感於人深也叔嗣觀於上世嘗里人死問其無以葬時顧妻耳脫金珥畀之夫婦猶歎終無恨色其鄰里每食相率之先熟之家不責賓主至少年乃直懷器轢諸其釜去今人聞所大笑之者即其風足感動於人心今復有是乎亡久矣俗之非奈何謂地形罪乎孔子曰文末吾猶人也躬行君子則吾未之有得矜文之末聖人不喜豫患夫流俗之言不惟其本所以定之故號亭曰定非侈往世之風烈儻後有其人庶幾遇之潞安府亭遊記潞安改府四年甲午六月侍御艾峯先生四行郡國吏畏民和登覽兹亭追惟有唐玄宗王迹繇起察興衰之轍求用舍之塗慨然太息是時新雨飄檻微陽移庭緑虹垂於天際餘紫生於林末開軒流目思在山澤歌以釋情而郡守宋君圭出廣平家傳相業篇終遂寄期望兹一時之盛也叔嗣獲從遊觀幸托名於石左參政分守冀南道髙叔嗣識清心省事堂銘嘉靖癸巳余罷吏部稽勳郎中出為山西布政司左參政分守冀南道始明約束踰歲禽巨盜于汾陽黜貪吏於某州屬年榖登竟內稱便乃為堂于治所宋潞安元錫為題其顔曰清心省事余既道滿改守冀寧殆三年於兹邦益習土風達民志貶身自厲務為儉約趨時之急不敢首事夫古之君子所為能悅于民者豈多為條教以暴其明哉茍察於身適得所止不戕於物不乏於務而已故能與下相忘與下相忘者下斯悅之矣蓋古之以道理人者如此而叔嗣何足知之乃作斯銘著於冀寧道之堂其辭曰嗚呼我聞毋以嗜欲殺身毋以貨利殺子孫毋以政事殺民毋以學術殺天下後世仁哉斯言我服而行至簡不煩銘於斯堂庶幾永存樊氏堂銘懿彼崇堂顯於東土海嶽回環青徐左右吁何迢遰歷世不朽也爰始發迹脫挽事主三朝擁旄千里開府分陜是隆襟齊帶魯惟聖執象寢兵包虎披榛誅茅手營兹宇回瞰故園消遙嘉圃王事多暇往來容與玄冥司節黃鐘應序時御髙庭白雪交下逮其晴霽擊牛伐鼓賓客稱觴賦詩笑語四海無波右文戢武故里有堂燕樂乃舉縣榜勒名樊公是取系曰天造草昧辟王室皇初拔劍漢為匹舞陽苗裔奮儒術立朝正色入造膝文作經綸武作帥文章之際功難悉司馬所沒民所律哲孫聿興祖德述辛未紀年符祖出三葉其今事如一遺堂克搆嘉志畢陳圖采詩在今日再拜作頌載厥實軼稿西征記初去都也羣友設祖東門外皆去樂安人李茂欽在户部獨追余飲三忠祠東以漕船載時四月中晨雨微霑人衣並河行三四里許各恍然歎息余識茂欽國子監既登進士歷吏部相得久甚一旦舍去未期會面何時回瞰雙闕在雲霧間因思曩日奉朝謁聽晨雞鳴夾立丹陛如此且十年令人不覺涕下其夕泊張家灣月欲望始出蒼然照水際帆檣如樹魚商雜集歌語相聞余身繇此逺矣余以疲謬之姿蒙國寵靈福過其量未有秋毫補今試山西倘殺身邉垂也欲以報國者於是繇河西務天津滄州東光觀家大人之舊治余始生八月家大人携之東明携之黟又從之東光十六而家大人解官十九而余舉於鄉逮於今未嘗一日習於囏也涉世甚淺得無躓於今呼繇東光達武城臨清會王純甫張子魚二人者同時考功之恭友也純甫是時拜國子祭酒子魚行兵備副使繇臨清達大名衛輝抵舍客誚髙子曰方今羣賢並足馳丹轂結華綬造天子之廷榮名嘉美流光亡窮吾子何獨厭于時而棄之外亦有説邪余對曰若叔嗣所謂福過其量者也天子拔賢而用輔弼必臯夔在廷必元愷海內承風羣士向化辟如騏驥騁於康莊而疲牛自伏楩柟登於明堂而散木自廢彼其材大小宜也余勝帶遊朝寺曾無所踰人賴罪之寬也尚得參領大藩儻陳愚朦之力究尋丈之用乎畏譏議且不暇矣而何説之有五月十三日歸九月二十三日始西涉黃河宿原武過修武上太行時秋盡山西木盡衰葉摵摵落遂入境行澤潞沁終日走大山中水泉交瀉深谷無底仰觀青松生嶺上蒙籠無數梁宋之人緩步遊歷才出城郭而已令聞此猶心生怖三晉屬薦飢早霜殺禾百姓怨恐羣盜匿山谷且出且入或殺縣吏而去傍縣皆震即撲滅復作有司方議賑事余然後知民之凋殘吏治之難也脫使趙廣漢張綱富弼張詠三四公者處此力能治乎十月六日余上官而分守冀南冀南者沁潞澤與遼汾也漢侯王傳郡守大吏也賈生汲長孺若不受於官彼其立朝意不自得故坎壈而長去然二子設用矣卒默默白首與漢羣臣何異誰當惜之者君子要當樹名于後爾豈必皆遇于時哉故黯與誼未為達也其明年三月甲午始作記西征後記髙子之謝病再補官而家大人年六十七益衰兄仲自虞衡謫嘉興矣無他兄弟以娛親者於是髙子覽於大明令曰官員祖父母父母及年七十許離職侍養適在稽勳又掌其事曰吾得歸侍吾親足矣會白之朝不果癸已春出為山西左參政夏繇漕河遡流而南問山西之塗曰繇原武黃河渡信宿達於澤行計之如是則得奉吾親行易也歸而白於大人辛卯壬辰癸巳三年而大人鬚髮白盡矣齒搖落曰吾老不能西其冬叔嗣則奉太夫人以行既處於山西省而叔嗣分守冀南當戍汾州分守之改戍汾也自青羊山之役始五歲而吏未有寧居者髙子二月之間三出三入於是太夫人勞叔嗣曰而二月之間三出三入者不以我乎始吾從而西也謂有寧居者今二月而三出三入是公私廢也太夫人遂有歸思矣叔嗣固不敢止踰歲二月十六日繇前路復於河南太夫人處山西者凡四月既南髙子送之泫然抆泣曰叔嗣罪不可解矣曩吾為郎中不能一建明今備官於邉心非不欲奮也而智力不逮也有老親在又戀不去欲何解其罪呼大梁東有田百畝退而思自牧其間嵗時奉杯酒上父母以終吾身焉不亦可緩罪呼又何求耶髙子於是呼始乞致仕乞終養疏山西等處承宣布政使司左參政臣髙叔嗣謹奏為陳情乞恩比例終養事臣年三十六歲河南開封府祥符縣人由進士歷任工部吏部主事員外郎郎中升補今官自度材能朽鈍智慮迂淺蒙受厚祿常思殞軀用補秋毫臣父珣先任東光知縣受敕封吏部考功清吏司主事見年七十老病間作臣兄仲嗣任嘉興府同知今升南京禮部祠祭清吏司郎中臣與兄俱守官局禮缺昏晨甘旨湯藥别無人事養每一念至心神殞越不勝私情伏覩諸司執掌內一欵凡官員父母年七十之上户內别無以次人丁者方許親身赴京面奏揭籍定奪候親終服滿起服赴部聽用又查臣同縣人陜西按察司副使郭鳳翺因伊弟鳳儀任湖州府同知同省人青州府知府胡湘伊弟瀚任禮部司務俱近年題準放回終養臣竊不忖獨犬馬微賤幸徼洪恩願比副使鳳翺知府湘例如蒙敕下吏部該司查實與二臣相同别無他礙放回原籍終養以盡一日烏鳥之孝臣不勝感戴籲祈之至為此具本令家人髙祿齎捧謹具奏聞伏候敕旨乞養疾疏吏部考功清吏司主事臣髙叔嗣謹奏為久病三次乞恩放歸調理事臣年二十五嵗河南開封府祥符縣人由進士臣少時竊不自愛身有犬馬之病去年為工部主事時疾狀有異卧旅舍中三月許具奏二次語在前本中未蒙放歸其月轉臣吏部稽勳清吏司主事無何又轉今官臣雖微才為朝廷所知伏自傷念不有少效也其何以酬恩者故忍而至今獨寄居他人舍中鄉邦友人皆識臣情苦自今月來前疾轉加伏枕纍息瞑眩無效自審難以供職是以昧死復請伏惟垂皇慈而展洪恩賜臣暫歸調理則聖朝無帷蓋之廢而微躬免溝壑之虞不勝努力思報之至為此具本令家人髙進人抱齎謹具奏聞伏候敕旨與孔文谷書頃過邑伏蒙臨幸頻日宴語闌宵投分實深報德良薄感愧何如叔嗣朅來江關尋亡王之陳迹探仙靈之奇蹤况值仲宣作賦之樓交甫解佩之浦登髙送目懷古愁心所恨不得攄情于良知聆音于大雅耳乍抵此諸務卒卒先此布問薛西原先生竟不受召殊為邑邑未審會見否頃有何篇章不惜示及鄙作栗生點定者一册附請教兼新刻願乞大序倘肯惠及數言即十朋之賜射虎髙作更望録至不一一與李少頴書奉辭忽一載邉邑兵凶相繼奔命西東塵勞可想此月初於任西溪方伯處得讀手翰慰藉良厚復諭及朝夕研岡默齋處追惟舊蹤令人恍歎何日復一合併髙論闌夕以寫鬱陶也賤子少慕老莊遺情物外自以頗纍患頃牽拘多故塊然悶處事與願違形隨衆役乃知放達之未真而結習之弗盡也仰愧古人豈不自惜老親賤室各在故園一身行役但增離思耳種種惟故人識之文章聲望如吾少頴淹居吏局久矣不一調何耶偶問及外試録文集隨上清覽統惟尊鑒不備答袁永之書曩者數辱過視伐其矇蔽弭節負郭之巷舉觴茂林之中逍遙文史夜以繼晝自惟亡侯生之奇而有虛左之顧乏假干之德而辱過式之禮非揚雄之玄而當造門之敬匪杜甫之舊而接出郊之歡是以臨别之日倚夷門而長謠望天邑而太息知遁迹之亡窮寤離羣之有限別後復收來書申之嘉言兼聞伯氏發迹並圭璋以秀朗連驊騮於長途斯天倫之極樂也言慕容音何時可再金門多暇持戟自適玩霸王之明略鑽孔墨之遺訓勉事聖君流聲當世使僕夫得髙枕於丘中永逃名於區外耕稼以輸王稅采樵以奉親顔於時新榖既升田家大洽肥羜烹以享神枯魚燔而召友蓑笠在户桔橰空懸濁醪相命擊缶長歌兹亦鄙人之自快而故人之所豫也相思無窮言不盡意努力自愛還憶音書蘇門集卷六
