body:
  text: 蘇門集卷四明髙叔嗣撰入楚稿髙君自山西左參政轉遷湖廣按察使去住所得凡十三首為入楚稿量移湖南用文谷韻歲暮邊隅客歸來見此身馬蹄穿欲盡虎穴到為鄰漳水經塗舊湘潭去路新我生豈斷梗逐處任飄淪陽曲灣作二首間庭芳草日分長疏雨髙槐夏轉涼一片鄉心千里目青山無數晚蒼蒼湖天杳杳夏吹風涼雨濛濛夜已空夢入梁園樵采路覺來身在戍樓中二月十日至尉氏含悽去舊里秣馬頓荒城是節春將半崇朝雨再晴鶬鶊欲作語楊柳盡垂榮楚塞杳何所嗟余方此征許州城南道行酬左君舜齊招隱之句微陽稍晴曙新雨被山川芳樹交生道春流灌注田耦耕本夙志驅役乃兹牽未覺江湖逺投身竊自憐襄縣城東即事春晴汝岸曲夜雨襄祠東日出冥濛霧天垂斷續虹關梁臨水閉馳道與山通旦夕龍輿度千城望幸中龍泉鎮作落照寫澄潭石梁水半含可憐雨氣歇復與天光涵客路乘春景人家映夕嵐我行殊未倦倣佛見荆南吕潭境上連山望不極况復楚雲長萬樹含春色孤村帶夕陽解鞍當古戍投袂及空堂去國日方逺懷君意敢忘漢江春日舟中漢臯微雨點人衣江路南衝鴈北歸寓目不堪愁逺涉投身方自愧髙飛纜牽蘅杜多春氣船泊雲霞變夕暉未許笠蓑同楚父來逃榮祿守漁磯初泛漢江東峪使君邀飲習池大堤兩岸春流滿峴山十里銜日晚新雨深沉洲嶼移餘霞明滅川途逺南來鞍馬背髙城泛舟始作漢江行總轡昨朝當寒食鼓枻今日值清明清明寒食愁江路逢人乍問栖泊處楊柳深垂渡口喧桃花淺映村頭暮襄陽使君乘暇日邀飲習池酒興逸然燈清夜歌管鳴吹角蒼波魚龍出去國未覺客身輕乘流翻恨風帆疾别君轉入江湖長明發解纜情如失自承天進船暮至潛江寄郭舜符漢渚雨聲深日暮愁客心楚山雲霧多其奈客行何時時登岸覽風物往往張帆去超忽泱漭江流雨正添蒙茸春樹日催發兹行豈是乘桴意欲遣虛舟隨所至生年本自江海人終朝遂諳魚鳥事投札鄉園報所思搴芳欣及仲春時頓忘異國勞行役但闕同心廢賞期省閣率爾題寄同懷下車春草歇掩閣夏雲深情以軒裳倦愁緣節候侵訟庭白鶴毳廨宇碧山岑乘夕恣逰屧慿髙敞鬱襟連天通漢水多雨暗楓林畏鵩非前志為鵬想壯心越鄉誰不感題此繼莊吟廣視堂作兹堂抗峯首伏檻即江流夕日川新漲空天雨半收煙虹形婉俾石壁色青幽行藥恣間步題篇紀勝遊城鄰龍伯國宅並羽人丘臨眺非無樂客心自有愁夏日作宴坐清煩暑闔扉映夕曛山堂聊假日水氣自蒸雲處潔嫌新沐懷竒厭舊聞齋中無一物几上太玄文軼稿髙君先自吏部乞病還蘇門山者三年復從蘇門山還朝逾年然後外補中間題咏頗衆今考功讀書二稿乃其自選多所不載何也括其遺編不忍棄選其優者凡五十二首為軼稿銅雀妓松柏墓已拱綺羅臺未空青冥上駐日白雪下流風雅曲此遺媺勞歌誰與同君王自不見閴寂無終窮題馮正伯卷太息髙蹤客誅茅滄海邊同來負鼎日共憶挂瓢年梁父龍初卧南山豹正眠有纓濯孔性無楫濟商川才為蒼生屈名緣赤紱牽九臯空唳羽七水但流絃僕類蓬南轉情同橘北遷塗中曳尾地轍外涸鱗天仰視鴟應嚇却驚鼠可憐重尋顯志賦長揖願歸田檢校戎器弱冠伏南土微才卓不羣雖懵坐勝術干戈非所聞九域效太運六位升明君黃石埋兵略青藜照祕文楛矢積北闕絃琴奏南薰龍庭元刋壘虎賁久息軍如何儲戎器還以事邊勳鶴膝非時急犀渠要日焚折衝存墨帶多算騁皇墳願言思農扈王化在耕耘病居得坎願自息披離忌有眚卧痾還以嬉煩囂暫一屏孤賤本寡儔升平遘多幸束髮辭丘園登軀入華省王事纍朝夕非才充俄頃不堪類昔嵇自免乃今邴北顧尚濡迹南歸徙引領歲暮詣空山耒耜方當秉主客行主人為夀客起酬今宵有酒可無憂鐙前大笑呼五白場中試賭敝貂裘去年奏賦驚天子今年謝病歸田里當路徒嗟少故人寧期行道得知己慷慨翻為他人論結交慎莫向金門門有車馬客行京城十二衢輪蹄何縱橫縱橫行且止金張門已盈媒拙坐趦趄言巧通逢迎中厨命豐饌四座羽觴傾南冠進楚舞西瑟發趙聲辰會日移中昏宴及鐘鳴主恩諒不訾殺身良為輕片辭重大吕一顧越兼城何如草玄客寂莫擅英名應僕晨趨長安衢冠蓋何逶迤歸視相國第輪蹄交中逵寒熱各有宜巧捷來相追拊膺悲遇晚握手稱新知一顧辭白屋片善登赤墀車馬如流水髙門象海涯主獨用憔悴談天祗自竒閉門幾草載無由免寒飢公孫起徒步黔突為帝師董生獨寂寂區區苦下帷濫竽竟有合敝帚將無施深謝彼竪子夙志良自持守兔誠言謬屠龍豈憤遲卑髙雖異勢慶弔亦同時浮榮等過隙暫跌若頽坻布被不覆寵禍載牛車危三年避園圃英聲千古垂守玄慕二老養素吾不移逝將還舊臯耕牧潛東災咄嗟奴僕心多言益見嗤中秋無月三五唯今夕煙霜斷昔歡埋輪濳泣兔掩鏡暗翔鸞風笛金天徹星樓子夜寒客衣素已變不分向明看秋思涼風今日至鴻鴈欲南征衣緩他鄉帶心翩故國旍園荆愁外死池草夢邊生會挽髙飛羽凌天寄别情雜詩窮巷寡人迹當户生芳草伊人空堂上徙倚傷懷抱獨攝敝衣冠容色何枯稿飛鳥更我庭斂翼空山早仰視默含情思歸故鄉道感秋二首候羽三秋至層鱗四運移商風吹地籟兑日正天時魚轍涸誰訴駒轅伏自悲紛傷庭木脫夢繞故園思玄蟬辭夏露丹木受秋霜坎壈應懷楚離憂欲奏商勞生嗟害馬失學歎亡羊蘭芷空山路披襟耿未忘贈别茂欽昭代富文化九葉何光華君初奮海裔應運生王家余本孤賤者射獵夷門野偶起攀飛龍俱載入金馬結綬自兹朝鳴玉日逍遙亨衢孰豫假同升上宰朝分曹青瑣闥聯步黃金闕居常願接屋遊每得并橛晤對無朝曛發蒙多所聞玉壺湛芳醑寶帙散仙文相知恨不早相與傾懷抱繾綣三年間莫喻同心好奈何忽分張念此使人傷銜哀赴隴墓反葬歸爾鄉倉卒發皇邑追餞難再及一臨萬里途三歎各於邑昔為連茹草今類孤根蓬我身非吾有誰使西或東離别易永久聚散誠不偶願言指素心努力望白首送許廷議狐嶺鬱蒼蒼龍沙出塞長千金收駿骨萬里歷羊腸雲就親庭色星分使路光亮為汲長孺隨力護封疆駕出帝出南郊日言觀黃屋尊選神役風伯徙樂具雲門馳道青陽麗齋宮紫氣屯九朝祠禮祕歸待從臣論駕入萬乘因春駕千門洞曉扉鸞旗紛既至龍馭宛來飛日月隨靈璽星辰撫帝璣還同受金䇿六覲紫宫歸讀史二首蕭生抗竒節立語忤當時解劍誼不辱抱關身敢辭伯喈涉叔世髠放久流離董氏握天憲臨命何狐疑知死亮難塞猖獗反受嗤雄傑在末位逆曵恆足悲結髮事天子兩絶良無期全生忌衆怒庶與哲人知傅子夜蛾感張公海燕篇撫膺慟末路發憤睹遺編憂來每側足患至豈息肩巢由既在野沮溺亦在田逹人貴先識懷寶乃稱賢送張子魚太嶽參議用家兄韻二首客路情何極臨途别所親威遲駕欲發隱閔思難伸柱始題仙侣環終賜帝臣交期無嘆逺白首肯如新妙有丹丘建虛無楚嶽寒五圖配神異七澤擅遊觀雲卧靈為友天行帝與歡知應逢石髓留減待余餐海口海路連天極河流繞國門氣迎朝雨至川束衆流奔隱霧行隨豹摶風坐辨鯤乘桴意何限揚楫倍傷魂晚行去國芳春在行舟首夏臨沙痕前水耗雨氣晚山隂衾枕容顔改衣裳節候侵不堪采菱調斷絶滯歸心讀書園始遊覽伯成善養志沮溺無仕心惜豫不及古逃祿歸空林林空杳靜默抗宇疏髙岑排户羣木秀浮階大壑深發書玩農術作歌學樵音輟耕空隴上徐步荒城隂身悲離羣獸目感歸栖禽雖微貞士操絶軌猶足尋役形多衆患遺物無或侵儻偕彭氏老異世開吾襟酬空同載酒見尋二首負郭幽常卧移尊逺共尋觴中泛野色座右落城隂自顧蘺蒿滿還驚巷轍深相看欲何語疲病謝朝簪農畝遭炎暑賓遊踐逺郊輟耕元水曲暢飲即城坳長日蟬聲靜微風樹色交空承白雪詠顧許愧林巢東郊雨中柬士量間居甘絶迹疏雨對芳原念欲開青眼誰還共緑尊林煙旁舍午野色逺村昏自笑平生意無人空閉門秋郊雨後空闊容秋望虛徐步晚曛夷門新夜雨太室半晴雲犢放前王地身間野客羣鳥來幽興愜誰語遣相聞喜蕭司勳袁比部見宿山園上客何時見中園屏卧幽門連莘野樹路轉信陵丘共坐深林晚紛看落木秋非君憐病侣誰向此淹留刈禾了晚望禾黍空場圃秋風滿近田出門看曠野倚杖向髙天嵩嶽孤煙直蓬池落日圓醉歌有鄰叟共笑夕林前谷杏山宅田水南限韻賦喜雪嘗聞洛闕呈祥日復此梁園對酒情故里衣冠時共集豐年隴畝兆還成金尊側引瑤華入青閣髙臨玉樹生今日正須修耒耜東郊驅犢伺春晴題東門壁試走夷門道徘徊念此身抱關空有客虛左竟何人寄霍山人歌驅車意不樂還出梁宋門馬頭逐殘景野火連孤村北風颯颯吹郊樹明月照見村前路東方隱者昨歸去相尋不見空相慕隔縣即同莘野田逢人只在空桑住明時不合但漁樵少年豈是窮章句羡君苦節應多竒嗟我支離亦如斯夙昔産業身無賴長大衣冠名未知有如徒步謁天子無何解印歸田里方計為儒世已驚祗言作吏人同毁畫堂賔舊走營營柴門容鬢看秋水西望夷門厭紛華東來却出寒城裏顧此栖栖何所求釣魚牧豕適吾謀野田憶汝不堪寐把筆題詩此夜愁呈枉顧諸君子誰復臨窮巷丘園問腐儒寒醪傾鑿落野飯進雕胡開牖連雲白穿林照日孤歲闌總相笑何處覓濳夫簡思仲涼野轉蕭條秋林自晴朗靜看霜葉落悶聽寒蟬響朱紱與時違素髮隨年長安得携手同常此丘園賞九月六日元玉侍御汝愚都使上方寺閣官曹雖異迹梵宇黍同遊預有重陽酒兼當故國樓登臨殊憶昨疲病颯驚秋不借空門樂那寬北望愁九月十日晚登城樓同川甫暝色起郊關層城煙霧間千家響砧杵四顧滿雲山片月增愁思涼風減病顔登髙情未已還共此追攀元玉送至河上夜飲作野館接芳筵客心尊酒前終知臨路别且戀對床眠近壁燭殘夜開簾星滿天鄉園猶在眼卧此已三年淇上旅館值芳辰留連淇水濱猶憐官道柳滿目故鄉春毗盧閣雪後招儀曹諸同遊春寺朝來雪微融望已晴千家柳色淺二月桃花生白日照仙閣青山繞帝城馮髙遲數子此際願同行與仰之閣上限韻晚日層軒上涼風散客襟登臨思不淺留滯夏將深三十竟何事一官空此心無驚寵與辱老氏有明針贈子晉濁酒相逢即為開憐君况是洛陽才久淹帝里誰能念數過禪扉獨見陪四月溫風吹草樹西山落日映樓臺它鄉盡醉無不可愁見都門歸馬催人日省中同正夫官閣晴雲滿春庭夜雪沾緑尊應汝伴白髮為誰添多病能相惜微官敢自嫌流光無奈此日日客心淹重五日宴集張宅將軍賜第敞園林上客邀歡得暫臨絃管坐消白日暑衣冠起挂緑槐隂官曹多暇乘佳節客路長愁損壯心須把菖陽頻送酒明年聚散倘思今送許中丞救水出撫畿內陸海邦千里黃圖帝九圍選賢每推食佐聖本垂衣詎意日多警方嗟天降威流離詩在是反覆事何非用翟子威暫輟霜臺亞羣馳星路暉寵光假金節拜命出黃扉疆埸當專制朝廷正塞違決河傷漢緒分陜壯周畿願見功成日時來朝禁闈奉和太保桂洲公二首宫酒先頒帝右臣恩波曉逐歲華新飲同湛露詩歌雅道合皇天嶽降申中使頗傳初釀法大官不數舊藏珍嘉名願叶春王夀涓滴香分萬國仁右元旦賜長春酒燎火陳庭逼曉明青旗鸞輅簇春城朝吹仙管條風應夜灑瑤宫瑞雪平天意三陽開歲始帝功一紀被歌聲共知調燮人難頌稽首明堂布法清右正月三日立春早朝赴晉渡黃河王程不可緩去此故園難晚日臨晴渚秋風動早寒山田十畝廢蓬鬢幾絲殘顧影真成笑馳驅為一官將歸蘇門山題王度支誠甫潼川卷十年出入紫宸班多病空知戀北山塵鬢獨憐為客倦道心長共野僧間行窺白石尋初徑坐對青松守舊關惆悵王孫不歸去潼川桂樹許誰攀進兵介休卷斾輕風發趨程落日懸重來介子縣還渡魏侯川吏道堪頭白兵戈正眼前親交齒盡落歸計只年年送馬二來視其弟遂歸上蔡握手慘離羣白眉重昔聞星辰來暫聚鴻鴈去還分春入荆南草天橫薊北雲新豐空復客無路薦明君别顧武祥夙昔屬良友同聲豈異時謬緣驥尾託常識鳯毛竒長價方推爾懷芳每在兹分飛意無限眷戀寄南枝送劉侍御叔正周侍御時伯視學南北二京方選士三府共推文辟下中臺動章連內殿聞春催遒鐸振星與使軺分桃李江南地驊騮冀北羣還觀文體變得俊答明君除夕殘歲何俱盡微情浩不窮引巵留夜色燒燭候春風旅迹孤蓬倦離心衆草同勞歌無處語楚水正飛鴻是時家兄使承天歲十一月皇陵山上作北上陪嚴祀初行詫所經龍蟠包地脈象衛列天星積雪千山白屯雲萬樹青神霄騰寶氣夜壑下仙靈險固合三用乾坤得一寧傳圖會有永探䇿授竒齡鄭師周石村卷題三首髙尚意何如窮山聞卜居神功無禹鑿人物有秦餘疊嶂維靈境孤峰冠太虛時因費杖履觸處覓仙書結搆依嶙峋幽深自可親雲峰連海嶠泉澗逹江津獨立迷山鬼端居養谷神何須羡谷口君即子真身世故攪余愁平居寡所仇有生皆白髮無地是丹丘稍抑六龍駕還追五嶽遊思君栖息地去此暫淹留禁中遇雪時有詔祈之落日長原獨客行郊園暑歇正新晴林懸宿雨千村似禾入涼飇四野平尊酒笑從田父飲柴門靜識古人情翻愁人擬陶元亮前徑初無五柳名自西園移向城東稍幽寂微生無定蹤擾擾誰為慮始營西郭居復戀東郊住東郊長幽寂野徑迷行處茅宇繞疏籬空階垂茂樹是時仲夏中林雨開殘曙無人敞深扉永日多新趣卧聽逺舂聲起看前村路兀傲不知非翻恨來兹暮如何玄豹姿更隱他山霧送别袁永之冠蓋中朝舊田園野客扉異時梁苑地今日長卿歸疲疾馮秋健歡娛悵逺違須知􅍦耕處一望使星暉九日有懷家工部兄無客荆扉掩蕭然病卧時荒村夜聽雨佳節曉吟詩鴻鴈銜書少黃花對酒遲楚山萬餘里今日最相思西園宴集談侍御空同本貞二憲使間園一杯酒還與故人同借問茅簷下何如柏府中城烏窺客晚野樹落筵空却愛霜林靜留歡共不窮秋夕憶兄一樹秋風落漸多髙天窺鳥暮雙過欲將逺字愁難送正把新詩悶自歌雲外楚山移使節雨中梁苑對耕蓑柴門此日誰憐病情極湘江萬里波飲酒空同海棠樹下分得一字庭前有奇樹含采弄春日托根磐石間垂景幽蘭室攀條事可憐對酒情非一空嗤嘉樹傳賦爾慚抽筆夏日田水南别業二首愛此君何僻憐余逺更親上皇猶古俗中散即今人樹繞夷門口隄橫汳水濵他方炎熱及逃暑欲來頻荷篠時相問銜杯晚暫同南風當坐滿大暑入林空勛業浮雲外田園醉眼中前村亦咫尺歸路夕陽紅陽春曲遲日麗原野和風扇芳林梨花覆白雪楊柳菀黃金峴北懷何極荆南思不禁睹時謝寂寞佇立吐髙吟秋日閣道涼風日已嚴空庭落木曉相添病身虛擬秋來健客路真驚歲尚淹北海鵬風猶未徙南山豹霧合終潛悠悠感事徒增歎歲暮誰從季主占雜詩悲風乘夕興木落歲方晏肅肅鴻鴈征悄悄客心羡王途悵多違三歲餘力倦興懷念故閭撫事夙𠂻見平生素絲姿豈為玄黃變知我亦已稀誰論貴耶賤賈令驛䇿馬寒雲鬢腳垂歲闌深歎客行遲亦知拙病今仍出歸去青山定幾時靈石縣作殘冬猶按縣落日稽官程閭里何蕭條荆榛正縱橫道逢流亡卒但聞悲泣聲不能舍之去且為緩前旌匡時豈乏䇿牽迫非我情髙職久為黍曵組暫百城星軺驛萬山詰曲此孤亭逺客西行暫所經生事不堪頭早白世情無賴眼常青深林落日慿軒望亂葉吟風隔坐聽寄謝罻羅當日者髙飛今已入冥冥南關驛壁間韻際曉霜風急空山落葉寒微名沉吏迹久客笑塵冠改轍登岡險尋源出路難回思髙卧者茅屋有餘安還次陽武與孔文谷飲和其韻二首時冬至後客子多苦辛塵滿征衣裳旦下太行坂車輪摧羊腸邊戍久不歸馬毛變繁霜安知平生親合并此中堂廣筵羅絲竹寒日懸晴光陳觴未及飲感往各自傷歲晏客如何欣願履初陽我心鬱不樂豈乏禦冬裳馳情多所懷無以布私腸山川行不竟飄颻冒風霜感彼瑚璉珍胡不置明堂時俗難與謀神寶祕其光每用攬古昔惄焉心自傷驅車復辭去陟馬大河陽七夕賦得牛女銀漢涼風起靈妃此夕過流雲通聚語微月照凌波帝樂無新曲仙機有舊梭應憐並飛羽忍用鵲填河夜懷家兄時有七歌示叔嗣髙梧殘雨滴涼氣晚來生一夕茅簷下思君千里情夜蟬臨户響晴月度林明要自離居苦長歌不遣平讀薛考功所注老子雨餘長夏交動望皆成趣雛鳥發新聲殘花開芳樹濁醪聊自斟輕葛始當御手持老子編目覩薛君注因之懷人心况以薄世故曲几在深林起視不覺莫書壁方知日月易歸來已三年先世有敝廬遺此東郭田况遭聖明君閭井各息肩自我解朝籍抱痾常晏眠衣冠挂塵壁起來茅簷前有時負藜杖逍遙看晴天柴門白日景雞犬鳴籬邊中心私自念微願倘能全安知被嚴命尚為尺組牽不行冒時禁欲去且留連仰扳道傍樹手種皆可憐人生豈落葉一往隨風遷亮懷逹人心萬乘猶將捐終當復來反不愧昔時賢蘇門集卷四
