body:
  text: 蘇門集巻七明髙叔嗣撰碑志山西八角堡新置守備碑嘉靖乙未朝邑韓公既治山西冬遂行三闗十二月繇代州登鴈門上寜武留六日歴八角所留一日校士射去至偏頭稽兵實賞有能定法除殘士心悦勵惟冀寜道左㕘政叔嗣僉事日乾鴈門兵備副使啟從踰嵗從鎮西入省公察於邉害要之地乃上言提督鴈門等闗兼廵撫山西右副都御史臣韓邦奇謹與鎮守山西副總兵臣鐸視邉闗歴八角堡察其道里南至鎮西衛裁一百四十東去寜武裁九十西至偏頭北至老營堡各如之其地適中臣以考之圖乃與大同西路平朔奶河堡荍麥川相値而地不甚險敵騎内侵路必出于此邉人數䝉其患往嵗都御史錠建此堡議甚是其額置守禦千户所一指揮一官軍一千四百然指揮非兵部所擬注即缺類以空員一人强使之其權甚輕兵將不識何以責成功且又本邉乏人臣見管隊諸職往往攝以旗軍雖百户亦無於是守禦指揮缺即不得不用腹裏者充之益非其人不良于用甚無益臣邦奇臣鐸謹議宣府地方如新河新開諸堡官軍裁三四百又無衛所比之八角相絶然尚為置守備臣謹請八角堡置守備一人領之便因奏偏頭指揮萬山可守備十五年闕月奏下兵部其月兵部奏俱如請叔嗣謹考山西地當敵一面其北守大同割朔應蔚渾源州屬之以南守鴈門鎮西鎮西者岢嵐州也洪武三十三年稍置偏頭成化二年置寜武則與鴈門而三其後正統末更置老營堡稍大之而置八角堡實由嘉靖元年始後二年成偏頭初領以都指揮後𢎞治十四年始移置副總兵鴈門寜武成化初置守備老營堡正徳八年置游擊將軍一人而八角置守備實由今始羣吏議伐石以紀苑洛公之徳視後世其系曰聖皇臨位匡撫萬國表畫河山鴈門南北乃立三闗以戢兵革蒞用鼎臣羣帥奉職鼎臣之恪法令修飭吏奉條約豪族屏匿下究閭井軌敎不忒細大齊同俱有品式嵗乃大和百穀繁植民歌于塗美衣衍食訟獄既平士行端直嵗十二月來廵邉域乃周三闗士馬審劾閲于平壖兵罔不克徼亭外内燧火衰息聲彼四逺酋長柔服乃建守臣下僚是陟疆埸謐寜惟公明徳我刋厥石以垂罔極新遷賈令驛碑賈令驛不知名所繇起置在盤陀同戈洪善之間嘉靖十五年八月大水壞驛舍其月祁縣知縣劉鋭因呈言驛去祁二十里而近並河民居裁百餘客来無肯安者常止祁傳乗糗芻縣驛兩具之以應客求惟祁所出民病不敢言且驛長諸役使皆近驛人為之善伺得其私公亡匿傳乘雖囚係亦解縱去莫誰何前後長以罪罷去不可勝數驛事益廢願因其壞遷之縣便當是時祁父老皆言驛當遷都察院下其呈驛傳道察院下分守道使都司斷事尹竭視之視之賈令東抵盤陀三十五里北抵同戈四十里南抵洪善七十里祁居其中盛言可遷㑹都察院結汾州獄繇祁還分守道白其狀議乃堅决曰必得人以專其工不然不就于是屬太原府檢校鄭鴻計其直期以畢工得代故成起以九月二十六日成以闕月闕日始賈令人食于驛聞驛遷聚族將訟之其言惑人檢校鴻遽撤其材盡歸之縣乃不果訟故太原名善訟不虛也夫以一驛之細其事明白如此不遷則祁民不堪而困已遷之則賈令不利而怨已怨者其私也微斷以行之有不為言所動者誰邪繇此言之彼其大者可慮也已嘉平渠碑惟嘉靖十四年十月朔都御史苑洛公平榆次康彥徳之訟徐溝王知縣懷禮乃刻石以明政意始榆次縣東泉出合流山曰小河水由馬村前西放至軍村過蜀巴村蜀巴村彥徳居之下流百姓治渠灌北胡喬西胡喬郝村太原右衛軍屯在徐溝者號庄子營及北闗廂村凡五連塍交注其約春引水起北胡喬以次及北闗廂秋起北闕廂以次及北胡喬各為長分督之以故田皆成膏沃而彥徳田在上游也水由地中直走下亡所用異時他村人引水至此從上或壞並渠田彥徳村人故塞其水于是他村人約為至期餉之酒若食不免則遺之糓尚無厭久之他村長趙文奎不忍乃訟之屯田道屯田道聽其獄弗直靣彥徳訟之都察院下分守道治於是分守道乃變其渠長諭他村人均出直割並渠地界之代納其税則長亡争屬懐禮成其事踰年春懐禮言渠事明白矣號其渠曰嘉平立石焉遂成鎭碑丙申夏四月叔嗣行夀陽方君體易同至要羅山視新鎮訖工樓屋壯堅登之傳舍作其下街衢洞直可觀已有樹新楹者三民曰自鎮成而遷至之家十有五矣于是題其門刻石號遂成始山西辛壬癸歲屢弗登羣盗萌芽而要羅山介陽曲夀陽榆次盂縣之間也東走京師西走蜀秦其路四達盗没其中吏莫之捕相視緩罪往往林巖蔽虧行旅百出百姓患之叅政今山東按察使遂寜陳君子學分守冀寜建保甲之法根逐踵係竟内盗息思制要害鎭議由是起矣㑹兵部奏欲為邉民修堡壁併居之以為固咨下諸撫廵都察院行子學乃援之請而都御史任西溪公可之使吏度要羅山地毁南溝寺撤古瓦橋材木茍完復分其力三縣来役工作子學遷去體易攝是道身督其工故有成也起以嘉靖十四年二月成以其冬十二月夀陽主簿牟嘉續榆次縣丞丘岳盂縣丞郝世爝牒告工畢請設廵檢司廵撫都察院察院下其呈叔嗣以設官置吏法當奏聞緩乃議置百長一人割三縣民壯五十𨽻之百長居官舍給之廪為常皆如議體易福清人今按察僉事分廵冀寜子學體易俱有文以道治民上下便之叔嗣實代子學守其條教不墜刻石紀其事汾州馬跑泉碑嘉靖十三年甲午正月冀南道汾州王府教授所申欲改引州城西馬跑泉水環城隂顓其利民並泉居且千餘家恃水以富百餘年其樂改否如何也廵撫都察院得敎授言信之符下分守冀南諸道親詣汾亟舉其事分守道時在潞安也心疑鑿引水泉妨民生業不便呈復議止之廵撫院以為不能身帥人徒託空言㑹冀寜道有賊殺石州吏目遂按行冀南道徑奪其俸收吏罰治之分守道既造汾汾士民數百餘人俱言引水無益而馬跑泉山下郝洪里人李從恩等果狀言自父祖以来世守其田源今欲引奪之必死亡聊其言哀痛百姓或哭遮道訟不已分守道符下權州平陽府推官授孝義縣丞前給事中國良往視之歸俱言地勢髙下崖谷斷連去城五七十里工作非鉅萬不可當夏秋山水漂發舉而棄之亡益也絶不可行分守道往眎之良信欲上其事復止之部吏皆震惑曰必重得罪當是時民饑訴賑分守道議以移沃野之粟救瘠土之人公私俱便可行呈上乃得請毎地畆勸義粟三斗貯之倉使同知蘇瓏掌其入諭民占水種田如舊於是汾父老議以分守道止不復改泉矣然吾等老後世子孫誰復知泉所為不改者乎諸司代去亡常安知後不有欲改泉而人弗能止者邪則羣詣道請刻其事石又懼藏碑不固請樹之公衙堂比余感其意叙其事刋之石叙復質直不文後人益笑余愚也大明北墅李公墓表北墅公始自慶陽徙開封當成化之十八年蓋為儒無所成有弟曰夢陽世稱空同先生幼異才公朂之顓學登進士以文章名公乃稱曰士而貴蓄道徳若庻人則惟居積不多之患于是習猗頓陶公之術遂以財雄第宅田園極膏沃子孫皆與開封人婚𢎞治中夀寜侯横時空同先生為户部主事也上書言其狀下獄繇是有直聲正徳元二監官劉瑾竊政户部洪洞韓尚書劾其罪而彈事出空同手瑾怒矯詔羣逐之已而逮繫空同京師使者乘勢窘廹且希瑾意欲殺之甚急家人畏或匿去公既富於財往来其間賔客游説萬端卒脫之獄空同直聲動天下而公遂以友愛聞有子四女四初娶真定阜平孟氏大同府知事楫之女也有婦徳生子根散官木舉人友竹為石􅀈岔驛丞而側室陳氏生子樹一女柳氏生三女諸孫子九某某女十曾孫子三女三公事父母孝處親族治家教子孫有法木既以丙子舉于鄉文翰茂美當世達士莫不交之而諸孫中用恒用謙用觀皆為府學生女嫁皆貴族歲時上夀車蓋至里巷為不通公好氣慷慨坐中起舞行酒客盡歡既老為諸子異產居之曰使後世相敬也享年七十五孟氏享年六十九卒合塟城北百岡空同先生之叙譜曰李氏貞義公者名恩贅于扶溝王聚而𨽻于慶陽寜州軍故居慶陽貞義公生忠號䖏士公世有達節處士公生正為阜平縣學訓導遷為周府封丘王教授號吏隠公娶髙氏生孟和字子育即公夢陽字獻吉孟章夭故公娶于阜平而家大梁從吏隠公也空同官至江西按察司提學副使先公卒叔嗣讀李氏之譜而用觀妻我兄子姻婭之間聞其行誼特著謹撰其大事刋石墓道以告勿毁明王先生配陳氏合塟志銘友人王子安生十八年甲戌為正徳九年厥考卒藁塟後二十年甲午為嘉靖十三年母陳氏卒踰年十月二十六日合塟之開封城東南神岡新阡子安追惟考妣之徳著于同年生馬昌𦙍之狀以命叔嗣銘狀曰王氏在元為蘭陽縣人大明興曰八老者初徙陳留縣天下甫定詔百姓得自墾田因家于堌陽鎮八老生玊玉生諒諒生宣宣生先生諱禄字天賜起跡田畆博學詩書明于古今之務卓犖不羣弱冠試于有司文辭甚偉補為開封儒學生受業京師車一之山東王懋綸諸公門下交相推奬許以經世之材遂及諸生亦逺讓伏流譽至今夫其徳輶所被聲實兼隆雖時弗遇人猶悼嗟故可述已乃若峭直之性與世寡交端嚴之度疾惡若仇然而聞善若驚視人猶已淵懿𢎞大温如春和故罕所尤于世焉至其孝友之行可質神鬼嘗聞父疾絶河歸視㑹履春氷奮出不死園廬遺產推致伯兄不取其豐致身以禮屢空晏如不幸早殁享年三十有八生民弗䝉其惠學士徒纂其業嗚呼痛哉有子康字子安舉進士省試録其文次子賡孫男四孟言仲言季言少言孫女三俱幼陳氏惟儀封之望粤有令徳慈柔純静克配先生躬履井臼至㬥馬通用供㸑婦職備修庭無間言以昌孫子享年六十叔嗣幸與子安好村墟相聞嘗拜太夫人堂下雞黍用勞惟我母氏接侍慈顔每語叔嗣謂王氏有賢母遂用刋石幽堂銘曰昌𦙍有云政缺道分魁儒藝士晻沕亡聞若王先生夫婦之徳儷于古訓其行弗忒更百後世孰知其則我銘茲石以眎罔極霍上蔡墓表嘉靖八年秋守河南都指揮軍事盧龍霍君錄其考上蔡知縣妣劉宜人死王事事河南髙叔嗣讀其書其奏曰給事中臣瓚言河南廵撫都御史臣璋廵按御史臣鰲言上蔡破賊殺其知縣恩裂尸四置縣門其妻先自罄於室武皇帝曰其贈光禄寺少卿劉贈宜人録其子下有司治祠屋共祀事其碑曰賊斷上蔡頸無血白氣縷縷若騰龍靣猶生其傳碑同而與奏絶異人曰霍氏不忍其酷故傳避之碑䝉其誤始賊入上蔡城上蔡人相與謀脱霍使一人衣冠偽走賊呼我知縣来賊則羣執以去以其間使霍可亡去霍不肯傳皆漏不載傳不可信要之死不可諱徒使後萬世人疑者當以奏為正於是采上蔡遺事勒石墓上遺事上蔡始為山陽設法省共餽私費為安邑不受富民請初富民翁獨死其妾私其貨於養子乃逐其養子歸其貨于其族以食其妾罷山民之為吏樵者遭宦者劉瑾奪其官起家為上蔡賊攻上蔡城凡一日夜城破猶巷戰城卑於故蔡城而附之故破劉宜人先上蔡一日死宜人築臺曰望夫宜人少蔡十二嵗繼取始人以上蔡少子免賊初戕上蔡於南門縣人收其尸上蔡少孤事繼母孝性不飲酒人不敢干其介三仕家不益皆碑未載者十五事合前十七事明袁處士公墓志銘袁處士公諱寳字尚資祥符人也家故髙貲始元季豪傑莫肯為吏多臧于賈中而處士先景英者筦公家鹽利㑹世已亂縣中人皆辟匿去景英獨計不去久之髙皇帝已定天下三年予百姓户繇縣中故族計裁六七家它盡乃客户景英帖為匠以此益饒知名生伍伍生貞貞生恭信敏信取曹氏生處士及定處士年十三信則卒亡何敏卒袁氏本據世業信敏以然諾四方客歸之列肆東衢上既皆已卒而處士幼好弄闘鳥游嬉衖中里父老或倚門笑曰是兒袁士衰矣處士聞則歸投殺鬬鳥持抱母問父生時狀三年足不復出前衖以千金往徠商吳楚間益敕行三楚秦晉江淮之良賈益多歸之乃復振當是時袁氏同財五世子孫數十非痛以禮折之則羣不相能而處士事其母最孝與弟定友愛鼂夕問汝得無饑寒事率身先之不以一錢入私室族以大和正徳中嘗詔郡國求五世不異火者有司皆計莫如袁某家乃以羊酒先袁氏奏定當上矣而太監鎮守府縛族子以他事欲殺之處士行千金立出之獄家繇此困而㫄他家幾欲得袁氏肆者念處士老諸舍子亶不分分而奪之易耳即紿謂諸子汝亶能分吾將佐汝金為生諸子心各欲自謀果訟欲分處士詣郡聽事叩頭屈指數吾為若取某嫁某未嘗多少為家三十餘年誠無狀然奈何使家至身破乎争不能止諸家既分乃置酒又要諸肆中賈客諸肆中賈客長老曰袁四未嘗利人一物妄一言欺我皆莫利從去諸家遂敗處士又振時猶恤諸家然前詔遂格不行它時郡縣春秋鄉飲求客學上處士名具以狀對郡乃召以為賓嘉靖八年十二月十九日疽發髩際卒計生天順五年十一月二日年六十九取晏氏繼方氏繼楊氏方氏生一女鎮平王府輔國將軍夫人楊氏生子四永爵學生永祚永徳永清女三一歸劉承武生一叔嗣封安人一陸柬生卜以踰年闕月闕日塟宋城西土橋旁晏氏方氏祔銘曰累蹶而趨亦莫躓也既豐于家而弗利也視居則卑徳之貴也鄉人之思卒相謂也辭以申之余歔欷也大明山東鄒縣學訓導陸公合塟墓志銘髙叔嗣有友壻陸生柬者陸生之父陸公生而甚秀異父名曰澄他日曰聞古有陸澄則更名清字汝清七嵗誦孝經朱氏小學少長受毛詩常知縣所通諸家之言為縣學諸生縣學諸生文盡出其下試輙得廪膳陸公連讓補後已貧者謂不足為儒也乃與其弟濙澤澍淳修孝友之事躬行於家當是時陸氏同食者數十而母族之貧者又數人大母家朱氏母家林氏盡仰給生死之具而朱氏故一子陸公嘗求得資之為賈又為取婦生子朱氏得不絶人由是頌陸公長者矣而郡太守至親拜陸公之父以子孝故也陸公嘗父母病不解衣日夜侍非口親嘗藥者不進父喪三日不一飲食母喪亦三日諸盡放古為之終喪五年卧廬中哭數幾死其後右目枯人益賢之無不欲知陸公者然而七舉不得第正徳十五年嵗貢入京師天子殿試例授山東鄒縣學訓導陸公欲之鄒卦之得不吉陸公謂人命也明年之鄒之鄉則以其學帥人不受諸生金錢居歲餘果卒諸生為棺衾哭皆哀陸生之母初舉人李海者取於杞之徐氏一夕徐夢見月光入於懷婦翁臨洮知府紳謂海汝夫婦當生賢女後海夫婦生女名曰金櫻因不肯妄予庸人時隂求可予者而人往往譽陸公而陸公業兩取皆早卒心亦儀李氏兩家遂為婚姻嫁時陸母年二十矣能孝舅姑姑林病困求𤓰同輩無敢進𤓰者陸母獨進𤓰陸公為儒而陸母自三四嵗時已通孝經列女傳等曉詩書治家家内外皆治生三子蘭先卒東陸生皆口授之書生二女亦先卒陸公之喪羣弟始異而陸母從二子歸塟也貧居一敗官舍中則以其嫁時衣被為東取于楊禎氏無何楊氏卒又為取於劉雲圖氏為陸生取于袁寳氏其治家猶如故時人莫見其婦姑面者陸母少嘗危疾陸公治之百方至是哭楊氏疾動卧兩月卒於是陸生兄弟議曰始吾北涯公塟時無銘非先人意今吾母又卒且吾陸自元儒學提舉五萬府君二世而中衛大夫儒學提舉名三世而克仁四世而銅陵教諭伯昻塟其地五世而鞏縣教諭貴常徴不就官始居祥符六世而鑑以有先人七世俱盛徳是不可泯故乞銘于髙氏陸公生成化六年三月七日卒嘉靖二年二月二十八日其年四月九日塟年五十四陸母生成化十三年四月十六日卒嘉靖八年八月五日闕年闕日塟年五十三初陸公所取陳氏琮女楊氏舉人瓚女兩人無子皆合塟事不載銘曰陸氏之先赫自金華本源六世波流而他自陸公討始識厥家由上而推蓋淵齡族二家藏之云譜所録陸氏之先儒亦世有澄也徳明今則不朽天昌其學而身不偶宋城南偏西者公墓三妃協徳合塟其處封君黃先生墓表先生諱錦字元美安丘宿家都人也族胄由興蓋自淮安元室板蕩官雖常次或遺其孥處于兹邑擇土浯河一世曰通甫二世曰大用三世曰友敬四世曰英隠淪不仕恭竢休明五世曰泰為文林郎泰娶鍾氏實生先生純徳懿行當世讓伏嘉言貞矩孚于閭里故可得而述已始侍文林府君歴官五臺寳豐應山出入翊贊俾無内顧海内稱亷服膺遺訓藏書禮器殁祭輒哭春秋嘉辰賓客罷慶攀墓慟毁用是疾亡母鍾痼病侍藥床褥經渉年所禱用身代遭喪悲號嘔血而瘖逮事繼母不易其禮與伯氏裳少長友愛庭亡間言裒多益寡幹蠱于家後奉伯氏裘書必均弗取其贏疾瘧相持奔命江淮卒完而歸孤祐罹賊蹈刅爭捄賊義乃舍親嫟故舊窮達弗變口鮮侈言交無私諾朋友讌好不能酣謔僮僕勞役恒用身先惟其孝友出諸天性動不踰軌言可貽謀享年六十有八嘉靖十二年七月闕日卒子曰祚禎祥禕禄女二長嫁張東萊次嫁劉萬鍾孫曰守中守正守道守黙守愚守莊守銓守藩守直守謨守讓守文守野守經孫女七禎字徳兆癸未賜進士出身春官録其文式歴官大司馬屬佩印典職治行卓絶為諸曹冠天子褒嘉詔先生封為承徳郎兵部職方主事辛卯武庫火徳兆下獄奪官歸無怨色以奉大人當世縉紳稱不容口叔嗣幸託徳兆末交誼均子弟習聞休範承訃哀慟追慕音容誦述光烈思垂罔極刋石墓道俾後子孫永觀于兹樂安李封君誄嘉靖六年丙戌正月十七日山東樂安李公卒于京師春秋六十又三公始家貧棄儒為吏授饒州府司獄後以子懋欽貴封授吏部稽勲主事服官克家作範當世則有三原馬伯循氏之銘彰徳崔子鍾氏之表明徳髙文歿而不朽於是乎在而嗣人思述前烈匪資一物茍人有其辭皆將被之金石顧叔嗣頑敝復何以效其言乎敢追而為誄曰昔在帝舜寔惟咎繇克慎典獄光於虞朝齊美五臣庸登大理厥姓斯官末胄稱李淑問世滋百代伊始惟公少長習詩敦禮誰謂儒行而安為史皇授司獄于彼饒州民訛訟徤邦典為仇桎梏日滿貨賂川流敬徳不恒物承之羞自公慎止郡邸孔修嚴嚴犴狴生出死入天作寒暑烖盭仍集貪殘之故捄命弗給網罹無辜恒嗟以泣人之寛猛過猶不及司獄秉徳乃柔乃剛屏其臭腐哺其疾瘍囚曰父母眎我如傷無或恐愓恃以不忘仲子耀文擢應嘉舉冠名春官飛歩宰府邦降嘉禮恩洽於親丹裳玉佩璽書四陳公拜是受寵命日新寛樂令終懸車海濱自時不造於今為甚鄒魯榛蕪文教衰寢喪服五禮民莫以諗抑抑封君化行繇家道偽以誠作儉于奢鄉用折衷時尠有加奉姑惟仁友弟惟愛每思禄養而親不逮純孝永思疾用是廢乙酉之年蓋至京師何以朂子先民有詩先民有詩夙夜在公著之翰墨以飭汝躬臨危末命道莫先忠言發長逝遺憲無窮嗚呼哀哉于公駟馬功在活人丙吉不死報及其身云何封君背世湮淪天道不􅀢厥嗣以信萬石周愼不言篤行微物必舉内行純明校徳徴古異世同稱無曰位薄善靡與京豈乏鼎食或隤其聲天之所與是謂仁榮身殁名劭来哲作程嗚呼哀哉蘇門集卷七
