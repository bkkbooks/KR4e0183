body:
  text: 跋蘇門先生集後蘇門先生集凡八巻後岡陳公首梓於湖省而考功讀書園諸稿多先生先日手所自輯愼傳也水陽亢公再梓於汴省而詩暨文廼增入數首重遺也蓋後岡為先生海内知交而水陽則先生甲午晉闈所取省解也愷也不佞壬辰就試南宫繆為先生所録迨今三十餘載慨師資之日逺幸斯集之猶存披誦之餘肅然如對先生焉蓋先生亢潔不羣雅自好修蓋其所撰述大都類其為人一字一句莫之能易大傳曰修辭立其誠又曰吉人之辭寡先生其立誠之吉人者哉總漕之明年為癸亥付揚守張君正位梓之不特以其辭焉已耳是嵗仲春之下澣日門人毛愷拜手敬識于集思廣益堂
