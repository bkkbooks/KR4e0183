body:
  text: 蘇門集後序正位自少聞河南蘇門先生名間嘗讀其詩若文則見格調閒逸意興端潔回出塵表輒撫卷而歎息見其人已而入仕宦游中外聞薦紳先生談其為人鋭情雅道不與世隨在都署而有山澤之想若鳳儀麟遊之不可羇思其人實與所著詩若文似之孟子曰誦其詩讀其書不知其人可乎位于先生有以知其人矣比位出守維揚幸厠總漕毛介川翁屬翁乃先生壬辰禮闈優録也坐鎮江淮文武為憲居嵗餘特召內臺將行出先生之集命之重梓俾後生知前輩之盛則又執集而歎曰視其所舉則知其所為舉之者聲應氣求固然也古之豪傑之士遇知于文場者如唐陸宣公之于韓昌黎宋歐陽之于蘇伯子而吕東萊一見陸象山之試卷即名知其人夫固有所辨也位雖未得見先生而先生之為人蓋益驗於知人矣然則兹集也其傳也夫翁道德文章光被海內而所至不欲以文顯竊見撫臨以來百務節省獨于此集用心焉豈惟知遇之私誠重其人也刻既成位不揣猥庸謬識末簡如此若夫先生著作之美則舊本已序之而我翁名世德勛朝之士大夫仰之凡轍迹所至之吏民頌之何止於江淮之間奚啻於當時之近則又何庸於位之喙云嘉靖癸亥嵗季春月吉旦直𨽻揚州府知府豫章後學張正位謹序
